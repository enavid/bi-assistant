- intent_id: headcount_gap_by_department
  title_fa: اختلاف نیروی موجود با چارت مصوب
  description_fa: اختلاف نیروی موجود با چارت مصوب
  route: SQL
  status: partial_supported
  question_type: analytical
  priority: medium
  supported_in_phase2: true
  demo_ready: true
  user_examples:
  - کدام واحد کمبود نیرو دارد؟
  - اختلاف نیروی موجود با چارت مصوب چقدر است؟
  - آیا تعادل بین چارت و واقعیت نیروی انسانی برقرار است؟
  trigger_terms_fa:
  - کمبود نیرو
  - چارت مصوب
  - نیروی موجود
  - اختلاف نیرو
  - تعادل چارت
  metrics:
  - name: actual_headcount
    title_fa: نیروی موجود
    expression: COUNT(v.employee_id)
  - name: approved_headcount
    title_fa: چارت مصوب
    expression: MAX(v.department_approved_headcount)
  - name: headcount_gap
    title_fa: اختلاف نیرو
    expression: MAX(v.department_approved_headcount) - COUNT(v.employee_id)
  required_columns:
  - employee_id
  - department_id
  - department_name
  - department_approved_headcount
  - is_active
  default_filters:
  - column: is_active
    operator: '='
    value: true
  group_by:
  - department_id
  - department_name
  output_type: table
  recommended_visualization: table
  report_id: RPT_HR_012
  sql_template_id: TPL_HEADCOUNT_GAP_BY_DEPARTMENT
  sql_hint: "SELECT\n  v.department_id,\n  v.department_name,\n  COUNT(v.employee_id) AS actual_headcount,\n  MAX(v.department_approved_headcount)\
    \ AS approved_headcount,\n  MAX(v.department_approved_headcount) - COUNT(v.employee_id) AS headcount_gap\nFROM hr_mvp.vw_hr_employee_analytics\
    \ v\nWHERE v.is_active = TRUE\nGROUP BY v.department_id, v.department_name\nORDER BY headcount_gap DESC;\n"
  notes_fa: برای دمو، اختلاف عددی در سطح دپارتمان قابل محاسبه است؛ تحلیل مدیریتی تعادل کامل نیازمند تعریف شاخص تکمیلی است.

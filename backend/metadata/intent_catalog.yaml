  - بازه سنی
  - سن
  metrics: *id001
  required_columns:
  - employee_id
  - age
  - is_active
  default_filters:
  - column: is_active
    operator: '='
    value: true
  optional_filters:
  - age < N
  - age >= N
  - age BETWEEN A AND B
  output_type: single_metric
  recommended_visualization: kpi_card

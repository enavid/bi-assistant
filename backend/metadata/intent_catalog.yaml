  - در هر حوزه
  metrics: *id001
  required_columns:
  - employee_id
  - service_domain
  - department_name
  - is_active
  default_filters:
  - column: is_active
    operator: '='
    value: true
  group_by:
  - service_domain
  - department_name
  output_type: table
  recommended_visualization: table
  report_id: RPT_HR_047
  sql_template_id: TPL_TOP_DEPARTMENT_PER_SERVICE_DOMAIN
  sql_hint: 'WITH dept_counts AS (

    SELECT v.service_domain, v.department_name, COUNT(v.employee_id) AS employee_count

    FROM hr_mvp.vw_hr_employee_analytics v

    WHERE v.is_active = TRUE

    GROUP BY v.service_domain, v.department_name

    )

    SELECT service_domain, department_name, employee_count FROM (

    SELECT service_domain, department_name, employee_count,

    ROW_NUMBER() OVER (PARTITION BY service_domain ORDER BY employee_count DESC, department_name
    ASC) AS rn

    FROM dept_counts) ranked

    WHERE rn = 1 ORDER BY employee_count DESC;

    '

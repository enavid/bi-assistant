version: '1.0'
project: HR BI Assistant
phase: Controlled SQL-based MVP
file_type: intent_catalog
language: fa-IR
description_fa: کاتالوگ intentهای قابل پشتیبانی برای تبدیل سؤال فارسی کاربر به خروجی ساختاریافته و انتخاب مسیر SQL، GAP یا
  REJECT در فاز دوم.
main_view:
  name: hr_mvp.vw_hr_employee_analytics
  alias: v
  contract: هر ردیف نماینده یک کارمند فعال برای تحلیل تجمیعی منابع انسانی است. قرارداد جاری و آخرین مدرک در View حل شده‌اند.
metadata_dependencies:
- data_dictionary.yaml
- semantic_layer.yaml
- kpi_catalog.yaml
- report_catalog.json
- sql_templates.yaml
- sql_validator_rules.yaml
- access_policies.yaml
- visualization_rules.yaml
- evaluation_goldset.json
default_output_schema:
  intent: string
  confidence: number_between_0_and_1
  route: SQL | GAP | REJECT
  status: supported | partial_supported | data_gap | access_denied | out_of_scope | needs_clarification
  metric: string | null
  filters: array
  group_by: array
  time_range: object | null
  required_columns: array
  sql_template_id: string | null
  report_id: string | null
  recommended_visualization: string | null
  notes: string | null
route_definitions:
  SQL: سؤال با View تحلیلی قابل پاسخ است و باید SQL امن SELECT-only تولید شود.
  GAP: سؤال منابع انسانی است اما داده، تعریف شاخص، قانون کسب‌وکاری یا سند کافی برای پاسخ دقیق وجود ندارد.
  REJECT: سؤال خارج از دامنه، حساس، فردمحور یا غیرمجاز است.
global_intent_rules:
  default_sql_view: hr_mvp.vw_hr_employee_analytics v
  default_filter: v.is_active = TRUE
  one_row_per_employee: true
  count_rule: COUNT(v.employee_id)
  safe_output_only: aggregated_results_only
  raw_tables_forbidden: true
  joins_forbidden_for_sql_generator: true
  select_star_forbidden: true
  individual_employee_rows_forbidden: true
  sensitive_columns_forbidden:
  - national_id
  - personnel_number
  - first_name
  - last_name
  - phone_number
  - address
  - bank_account
  - insurance_number
  gap_status_sql: SELECT 'DATA_GAP' AS status;
  access_denied_sql: SELECT 'ACCESS_DENIED' AS status;
  out_of_scope_sql: SELECT 'OUT_OF_SCOPE' AS status;
intent_parser_guidance:
  parser_goal: سؤال کاربر را به intent، metric، filters، group_by، route و status تبدیل کند؛ نه اینکه مستقیم SQL بسازد.
  normalization_examples:
  - user_term: کارکنان / پرسنل / نیروها
    normalized_to: employee_count
    column_or_metric: COUNT(v.employee_id)
  - user_term: زن / زنان
    normalized_to: gender_filter
    column_or_metric: v.gender = 'زن'
  - user_term: مرد / مردان
    normalized_to: gender_filter
    column_or_metric: v.gender = 'مرد'
  - user_term: مدرک / تحصیلات / آخرین مدرک
    normalized_to: education
    column_or_metric: v.education_title
  - user_term: نوع استخدام
    normalized_to: employment_type
    column_or_metric: v.employment_type
  - user_term: نوع قرارداد
    normalized_to: contract_type
    column_or_metric: v.contract_type
  - user_term: پیمانکاری / شاغل در پیمانکاری
    normalized_to: contractor
    column_or_metric: v.is_contractor = TRUE
  - user_term: حوزه / حوزه خدمت
    normalized_to: service_domain
    column_or_metric: v.service_domain
  - user_term: بخش / واحد / اداره / دپارتمان
    normalized_to: department
    column_or_metric: v.department_name
  - user_term: استان
    normalized_to: province
    column_or_metric: v.province
  - user_term: شهر
    normalized_to: city
    column_or_metric: DATA_GAP
  - user_term: جذب / سال جذب
    normalized_to: hire_year
    column_or_metric: v.hire_year
  - user_term: سابقه / سنوات
    normalized_to: service_years
    column_or_metric: v.service_years
  - user_term: چارت مصوب
    normalized_to: approved_headcount
    column_or_metric: v.department_approved_headcount
intents:
- intent_id: total_employee_count
  title_fa: تعداد کل کارکنان فعال
  description_fa: تعداد کل کارکنان فعال
  route: SQL
  status: supported
  question_type: statistical
  priority: high
  supported_in_phase2: true
  demo_ready: true
  user_examples:
  - تعداد کل کارکنان چند نفر است؟
  - الان چند نفر نیرو داریم؟
  - تعداد پرسنل فعال چقدر است؟
  - کل نیروهای سازمان چند نفرند؟
  trigger_terms_fa:
  - تعداد کل
  - کل کارکنان
  - کل پرسنل
  - چند نفر نیرو
  metrics: &id001
  - name: employee_count
    title_fa: تعداد کارکنان
    expression: COUNT(v.employee_id)
  required_columns:
  - employee_id
  - is_active
  default_filters:
  - column: is_active
    operator: '='
    value: true
  group_by: []
  output_type: single_metric
  recommended_visualization: kpi_card
  report_id: RPT_HR_001
  sql_template_id: TPL_TOTAL_EMPLOYEE_COUNT
  sql_hint: 'SELECT COUNT(v.employee_id) AS employee_count

    FROM hr_mvp.vw_hr_employee_analytics v

    WHERE v.is_active = TRUE;

    '
- intent_id: employee_count_by_gender
  title_fa: تعداد کارکنان به تفکیک جنسیت
  description_fa: تعداد کارکنان به تفکیک جنسیت
  route: SQL
  status: supported
  question_type: statistical
  priority: high
  supported_in_phase2: true
  demo_ready: true
  user_examples:
  - تعداد زن و مرد چند نفر است؟
  - کارکنان به تفکیک جنسیت چقدر هستند؟
  - چند نفر زن و چند نفر مرد داریم؟
  - توزیع جنسیتی کارکنان را نشان بده
  trigger_terms_fa:
  - زن و مرد
  - تفکیک جنسیت
  - جنسیت
  - توزیع جنسیتی
  metrics: &id002
  - name: employee_count
    title_fa: تعداد کارکنان
    expression: COUNT(v.employee_id)
  - name: percentage
    title_fa: درصد از کل
    expression: ROUND(COUNT(v.employee_id) * 100.0 / NULLIF(SUM(COUNT(v.employee_id)) OVER (), 0), 2)
  required_columns:
  - employee_id
  - gender
  - is_active
  default_filters:
  - column: is_active
    operator: '='
    value: true
  group_by:
  - gender
  output_type: grouped_metric
  recommended_visualization: pie_chart
  report_id: RPT_HR_002
  sql_template_id: TPL_EMPLOYEE_COUNT_BY_GENDER
  sql_hint: "SELECT\n  v.gender,\n  COUNT(v.employee_id) AS employee_count,\n  ROUND(COUNT(v.employee_id) * 100.0 / NULLIF(SUM(COUNT(v.employee_id))\
    \ OVER (), 0), 2) AS percentage\nFROM hr_mvp.vw_hr_employee_analytics v\nWHERE v.is_active = TRUE\nGROUP BY v.gender\n\
    ORDER BY employee_count DESC;\n"
- intent_id: gender_percentage
  title_fa: درصد کارکنان زن یا مرد
  description_fa: درصد کارکنان زن یا مرد
  route: SQL
  status: supported
  question_type: statistical
  priority: high
  supported_in_phase2: true
  demo_ready: true
  user_examples:
  - چند درصد کارکنان زن هستند؟
  - درصد کارکنان مرد چقدر است؟
  - سهم زنان از کل کارکنان چقدر است؟
  - چه درصدی از کارکنان زن هستند؟
  trigger_terms_fa:
  - درصد زن
  - سهم زنان
  - درصد مرد
  - سهم مردان
  - تعادل جنسیتی
  metrics:
  - name: percentage
    title_fa: درصد جنسیت از کل
    expression: ROUND(SUM(CASE WHEN v.gender = <value> THEN 1 ELSE 0 END) * 100.0 / NULLIF(COUNT(v.employee_id), 0), 2)
  required_columns:
  - employee_id
  - gender
  - is_active
  default_filters:
  - column: is_active
    operator: '='
    value: true
  optional_filters:
  - gender
  output_type: single_metric
  recommended_visualization: kpi_card
  sql_hint: "SELECT\n  ROUND(SUM(CASE WHEN v.gender = 'زن' THEN 1 ELSE 0 END) * 100.0 / NULLIF(COUNT(v.employee_id), 0), 2)\
    \ AS percentage\nFROM hr_mvp.vw_hr_employee_analytics v\nWHERE v.is_active = TRUE;\n"
  semantic_rules:
  - اگر سؤال درباره زنان باشد مقدار gender برابر 'زن' است.
  - اگر سؤال درباره مردان باشد مقدار gender برابر 'مرد' است.

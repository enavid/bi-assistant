version: '1.0'
project: HR BI Assistant
phase: Controlled SQL-based MVP
file_type: data_dictionary
language: fa
description_fa: تعریف رسمی ستون‌های View تحلیلی منابع انسانی برای استفاده در metadata_service، SQL Generator، SQL Validator
  و Response Builder.
main_view:
  name: hr_mvp.vw_hr_employee_analytics
  schema: hr_mvp
  alias: v
  database: PostgreSQL
  row_grain: one_row_per_active_employee
  row_grain_fa: هر ردیف معادل یک کارمند فعال برای تحلیل منابع انسانی است.
  safe_for_llm_sql_generation: true
  description_fa: View اصلی تحلیل منابع انسانی. قرارداد جاری، آخرین مدرک، ساختار سازمانی، محل خدمت، پست و گروه سنی در همین
    View آماده شده‌اند و مدل نباید به جدول‌های خام دسترسی داشته باشد.
view_contract:
  only_allowed_sql_source: hr_mvp.vw_hr_employee_analytics v
  default_filter: v.is_active = TRUE
  current_contract_resolved_in_view: true
  latest_education_resolved_in_view: true
  raw_tables_hidden_from_model: true
  joins_by_model_allowed: false
  select_star_allowed: false
  individual_employee_output_allowed: false
  aggregated_reporting_only: true
source_tables_for_documentation_only:
- hr_mvp.hr_employees
- hr_mvp.hr_contracts
- hr_mvp.hr_employee_education
- hr_mvp.hr_education_levels
- hr_mvp.hr_departments
- hr_mvp.hr_locations
- hr_mvp.hr_positions
- hr_mvp.hr_age_groups
global_sql_rules:
  employee_count_expression: COUNT(v.employee_id) AS employee_count
  average_age_expression: ROUND(AVG(v.age), 2) AS average_age
  average_service_years_expression: ROUND(AVG(v.service_years), 2) AS average_service_years
  group_share_percentage_expression: ROUND(COUNT(v.employee_id) * 100.0 / NULLIF(SUM(COUNT(v.employee_id)) OVER (), 0), 2)
    AS percentage
  condition_percentage_expression: ROUND(SUM(CASE WHEN condition THEN 1 ELSE 0 END) * 100.0 / NULLIF(COUNT(v.employee_id),
    0), 2) AS percentage
  headcount_gap_department_expression: MAX(v.department_approved_headcount) - COUNT(v.employee_id) AS headcount_gap
  headcount_gap_warning_fa: department_approved_headcount روی ردیف کارکنان تکرار می‌شود و نباید مستقیم SUM شود.
privacy_and_access_rules:
  output_level: aggregated_only
  blocked_individual_outputs:
  - employee_id
  - birth_date
  - hire_date
  - contract_start_date
  - contract_end_date
  sensitive_columns_intentionally_excluded_from_view:
  - national_id
  - personnel_number
  - first_name
  - last_name
  - phone_number
  - address
  - bank_account
  - insurance_number
  - personal_identifier
  access_denied_sql: SELECT 'ACCESS_DENIED' AS status;
  data_gap_sql: SELECT 'DATA_GAP' AS status;
data_gap_rules:
- concept: city_level_analysis
  trigger_terms_fa:
  - شهر
  - سطح شهر
  - تحلیل شهری
  status: DATA_GAP
  reason_fa: در MVP فعلی داده شهر قابل اتکا نیست.
- concept: near_retirement_analysis
  trigger_terms_fa:
  - آستانه بازنشستگی
  - نزدیک بازنشستگی
  - در شرف بازنشستگی
  status: DATA_GAP
  reason_fa: قانون رسمی بازنشستگی بر اساس سن، سابقه، جنسیت و قواعد سازمانی هنوز در Metadata تعریف نشده است.
- concept: monthly_hiring_trend
  trigger_terms_fa:
  - روند جذب ماهانه
  - جذب ماهانه
  status: DATA_GAP
  reason_fa: در View فعلی ستون ماه/تقویم معتبر برای تحلیل ماهانه وجود ندارد.
- concept: contractor_productivity_analysis
  trigger_terms_fa:
  - بهره‌وری پیمانکار
  - عملکرد پیمانکارها
  status: DATA_GAP
  reason_fa: داده بهره‌وری یا عملکرد پیمانکارها در MVP فعلی وجود ندارد.
columns:

  permissions:
    can_select_in_aggregate_output: false
    can_select_individual_output: false
    can_group_by: false
    can_filter: false
    can_aggregate: true
  sensitivity:
    level: medium
    contains_personal_data: true
    privacy_rule_fa: نمایش مستقیم employee_id مجاز نیست؛ فقط داخل COUNT(v.employee_id) استفاده شود.
  data_quality:
    status: reliable
  allowed_aggregations:

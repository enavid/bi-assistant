version: '1.0'
project: HR BI Assistant
phase: Controlled SQL-based MVP
file_type: visualization_rules
language: fa-IR
description_fa: قوانین انتخاب و ساخت خروجی بصری برای پاسخ‌های HR BI Assistant شامل کارت KPI، جدول، نمودار میله‌ای، خطی، دایره‌ای،
  میله‌ای افقی، میله‌ای انباشته و پیام‌های وضعیت.
main_view:
  name: hr_mvp.vw_hr_employee_analytics
  alias: v
metadata_dependencies:
- data_dictionary.yaml
- semantic_layer.yaml
- intent_catalog.yaml
- report_catalog.json
- sql_templates.yaml
- sql_validator_rules.yaml
- access_policies.yaml
- evaluation_goldset.json
visualization_contract:
  purpose_fa: این فایل به response_builder.py و chart_builder.py می‌گوید بر اساس intent، شکل داده و سیاست محرمانگی، خروجی
    مناسب را انتخاب کنند.
  input_sources:
  - detected_intent
  - detected_route
  - validation_status
  - report_id
  - sql_template_id
  - query_result_columns
  - query_result_rows
  - user_role
  - access_policy_result
  output_target_modules:
  - response_builder.py
  - chart_builder.py
  - explanation_generator.py
  - frontend_chart_renderer
  allowed_routes:
  - SQL
  - GAP
  - REJECT
  sql_route_allowed_visuals:
  - kpi_card
  - kpi_card_group
  - table
  - bar_chart
  - horizontal_bar_chart
  - stacked_bar_chart
  - line_chart
  - pie_chart
  gap_route_visual: status_message
  reject_route_visual: status_message
  individual_employee_rows_allowed: false
  sensitive_columns_allowed: false
  raw_table_reference_allowed: false
  default_language: fa-IR
  right_to_left: true
  default_empty_result_visual: status_message
global_rules:
  safe_output_rules:
  - Visualization must never expose individual employee-level rows.
  - employee_id can only be used for aggregation and must not be displayed as a visible dimension.
  - Sensitive personal fields must never be displayed even if they appear in a query result by mistake.
  - If SQL Validator returns DATA_GAP, ACCESS_DENIED, OUT_OF_SCOPE, or NEEDS_CLARIFICATION, use status_message only.
  - If access policy suppresses rows or metrics, visualization must respect the suppression result and show a limitation note.
  default_filter_note_fa: خروجی‌ها بر اساس کارکنان فعال محاسبه می‌شوند، مگر اینکه در سؤال یا گزارش خلاف آن مجاز و مشخص شده
    باشد.
  min_group_size_default: 5
  min_group_size_behavior: اگر یک گروه کمتر از حداقل مجاز عضو داشته باشد، مقدار آن باید suppress یا با گروه سایر ادغام شود؛
    تصمیم نهایی با access_policies.yaml است.
  max_rows_for_chart: 20
  max_rows_for_default_table: 50
  top_n_default: 10
  other_bucket_label_fa: سایر
  null_label_fa: نامشخص
  no_data_message_fa: برای این سؤال، داده قابل نمایش در نسخه فعلی وجود ندارد.
  chart_title_required: true
  chart_subtitle_required: false
  show_data_limitations: true
  show_source_view: true
  source_view_label: hr_mvp.vw_hr_employee_analytics
visualization_types:
- type: kpi_card
  title_fa: کارت شاخص
  use_when:
  - نتیجه یک مقدار عددی اصلی دارد.
  - سؤال درباره تعداد کل، درصد کل، میانگین کلی یا یک فیلتر مشخص است.
  - خروجی شامل یک ردیف و یک یا چند metric محدود است.
  expected_data_shape:
    min_rows: 1
    max_rows: 1
    required_metric_count_min: 1
    dimension_columns_allowed: false
  preferred_metrics:
  - employee_count
  - percentage
  - average_age
  - average_service_years
  - contractor_percentage
  fallback_visual: table
  formatting:
    employee_count: integer
    percentage: percentage_2_decimals
    average_age: decimal_2
    average_service_years: decimal_2
    headcount_gap: integer_with_sign
- type: kpi_card_group
  title_fa: گروه کارت شاخص
  use_when:
  - خروجی چند شاخص کلیدی مستقل دارد.
  - برای خلاصه مدیریتی لازم است تعداد و درصد کنار هم نشان داده شوند.
  expected_data_shape:
    min_rows: 1
    max_rows: 6
    required_metric_count_min: 2
    dimension_columns_allowed: true
  fallback_visual: table
- type: table
  title_fa: جدول
  use_when:
  - خروجی چند ستون محاسباتی دارد.
  - نیاز به نمایش دقیق عددی، چند metric، یا وضعیت partial دارد.
  - گزارش‌هایی مثل اختلاف چارت مصوب، کمبود نیرو و مقایسه چند شاخص در سطح دپارتمان.
  expected_data_shape:
    min_rows: 1
    max_rows_default: 50
    dimension_columns_allowed: true
    metric_columns_allowed: true
  fallback_visual: status_message
  formatting:
    show_row_number: true
    freeze_first_column: true
    rtl_headers: true
    numeric_alignment: left_in_rtl_ui
    default_sort: as_sql_order
- type: bar_chart
  title_fa: نمودار میله‌ای
  use_when:
  - مقایسه تعداد یا درصد بین دسته‌های محدود لازم است.
  - تعداد دسته‌ها معمولاً بین ۲ تا ۶ است.
  - ترتیب زمانی موضوع اصلی نیست.
  expected_data_shape:
    min_rows: 2
    max_rows_recommended: 6
    required_dimension_count: 1
    required_metric_count_min: 1
  fallback_visual: horizontal_bar_chart
  sort_rule: employee_count_desc_unless_ordered_dimension
  avoid_when:
  - تعداد دسته‌ها زیاد است و برچسب‌ها طولانی هستند.
  - داده روند زمانی است؛ در آن حالت line_chart بهتر است.
- type: horizontal_bar_chart
  title_fa: نمودار میله‌ای افقی
  use_when:
  - تعداد دسته‌ها زیاد است یا نام دسته‌ها طولانی است.
  - گزارش رتبه‌بندی مانند استان، واحد، نوع قرارداد یا محل خدمت است.
  - مقایسه دقیق بین دسته‌ها مهم‌تر از ترکیب سهم است.
  expected_data_shape:
    min_rows: 2
    max_rows_recommended: 20
    required_dimension_count: 1
    required_metric_count_min: 1
  fallback_visual: table
  sort_rule: metric_desc
  top_n_rule: اگر تعداد ردیف‌ها بیشتر از max_rows_for_chart بود، top_n_default نمایش داده شود و باقی در سایر ادغام شود، مگر
    اینکه کاربر جدول کامل بخواهد.
- type: stacked_bar_chart
  title_fa: نمودار میله‌ای انباشته
  use_when:
  - دو بعد دسته‌ای هم‌زمان وجود دارد، مثل گروه سنی به تفکیک جنسیت.
  - هدف مقایسه ترکیب داخل هر گروه است.
  expected_data_shape:
    min_rows: 2
    required_dimension_count: 2
    required_metric_count_min: 1
  fallback_visual: table
  allowed_secondary_dimensions:
  - gender
  - is_contractor
  - employment_type
  avoid_when:
  - تعداد گروه‌های بعد دوم زیاد است.
  - داده شامل مقادیر suppression شده به علت محرمانگی است.
- type: line_chart
  title_fa: نمودار خطی
  use_when:
  - داده روند زمانی یا توالی مرتب دارد.
  - محور x سال جذب یا دوره زمانی است.
  - هدف نمایش روند افزایشی، کاهشی یا نوسانی است.
  expected_data_shape:
    min_rows: 2
    required_dimension_count: 1
    required_metric_count_min: 1
    ordered_x_axis_required: true
  fallback_visual: table
  sort_rule: time_or_ordered_dimension_asc
  x_axis_allowed_columns:
  - hire_year
  - year
  - period
- type: pie_chart
  title_fa: نمودار دایره‌ای
  use_when:
  - هدف نمایش ترکیب سهم از کل در یک مقطع است.
  - تعداد دسته‌ها کم است و مجموع آن‌ها یک کل معنادار را تشکیل می‌دهد.
  - برای جنسیت یا وضعیت‌های دو/سه‌دسته‌ای مناسب است.
  expected_data_shape:
    min_rows: 2
    max_rows_recommended: 5
    required_dimension_count: 1
    required_metric_count_min: 1
  fallback_visual: bar_chart
  avoid_when:
  - تعداد دسته‌ها بیشتر از ۵ است.
  - رتبه‌بندی دقیق مهم است.
  - دسته‌ها کل واحد و معناداری را نمی‌سازند.
- type: status_message
  title_fa: پیام وضعیت
  use_when:
  - مسیر GAP یا REJECT انتخاب شده است.
  - SQL Validator اجرای کوئری را رد کرده است.
  - نتیجه خالی است یا داده کافی برای نمایش نمودار وجود ندارد.
  expected_status_values:
  - DATA_GAP
  - ACCESS_DENIED
  - OUT_OF_SCOPE
  - NEEDS_CLARIFICATION
  - SQL_VALIDATION_FAILED
  - NO_DATA
  fallback_visual: null
selection_rules:
- rule_id: VIS_RULE_001
  name: status_first
  priority: 1
  condition: route in ['GAP', 'REJECT'] or validation_status not in ['VALID', 'SUCCESS', 'SUPPORTED']
  select_visualization: status_message
  reason_fa: برای Gap، Reject و خطا نباید نمودار یا جدول تحلیلی ساخته شود.
- rule_id: VIS_RULE_002
  name: single_metric_kpi
  priority: 2
  condition: result has one row and one primary metric
  select_visualization: kpi_card
  reason_fa: برای عددهای کلیدی، کارت KPI خواناتر است.
- rule_id: VIS_RULE_003
  name: single_row_multiple_metrics
  priority: 3
  condition: result has one row and multiple metrics
  select_visualization: kpi_card_group
  reason_fa: چند شاخص خلاصه بهتر است کنار هم نمایش داده شوند.
- rule_id: VIS_RULE_004
  name: time_series_line
  priority: 4
  condition: dimension is hire_year or ordered period
  select_visualization: line_chart
  reason_fa: روند جذب یا داده زمانی باید خطی نمایش داده شود.
- rule_id: VIS_RULE_005
  name: few_categories_pie_allowed
  priority: 5
  condition: dimension is gender or another part-to-whole category with <= 5 categories and percentage exists
  select_visualization: pie_chart
  fallback_visualization: bar_chart
  reason_fa: برای ترکیب سهم ساده، نمودار دایره‌ای قابل استفاده است.
- rule_id: VIS_RULE_006
  name: category_count_bar
  priority: 6
  condition: one categorical dimension and row_count between 2 and 6
  select_visualization: bar_chart
  reason_fa: برای مقایسه دسته‌های محدود، نمودار میله‌ای مناسب است.
- rule_id: VIS_RULE_007
  name: many_categories_horizontal_bar
  priority: 7
  condition: one categorical dimension and row_count > 6
  select_visualization: horizontal_bar_chart
  reason_fa: برای دسته‌های زیاد یا نام‌های طولانی، میله‌ای افقی خواناتر است.
- rule_id: VIS_RULE_008
  name: two_dimensions_stacked_bar
  priority: 8
  condition: two categorical dimensions and second dimension in allowed_secondary_dimensions
  select_visualization: stacked_bar_chart
  fallback_visualization: table
  reason_fa: برای ترکیب جنسیت/پیمانکاری در گروه‌ها، میله‌ای انباشته مناسب است.
- rule_id: VIS_RULE_009
  name: multi_metric_table
  priority: 9
  condition: result has multiple dimensions or more than two metrics
  select_visualization: table
  reason_fa: برای خروجی‌های چندشاخصی، جدول دقیق‌تر و امن‌تر است.
- rule_id: VIS_RULE_010
  name: headcount_gap_table
  priority: 10
  condition: intent contains headcount_gap or columns include actual_headcount and approved_headcount and headcount_gap
  select_visualization: table
  fallback_visualization: horizontal_bar_chart
  reason_fa: اختلاف چارت مصوب باید با عدد دقیق و محدودیت تحلیل نمایش داده شود.
column_role_mapping:
  dimension_columns:
    gender:
      label_fa: جنسیت
      preferred_visuals:
      - pie_chart
      - bar_chart
    marital_status:
      label_fa: وضعیت تأهل
      preferred_visuals:
      - bar_chart
      - pie_chart
    age_group_title:
      label_fa: گروه سنی
      preferred_visuals:
      - bar_chart
    education_title:
      label_fa: مدرک تحصیلی
      preferred_visuals:
      - bar_chart
      - horizontal_bar_chart
    education_category:
      label_fa: گروه تحصیلی
      preferred_visuals:
      - bar_chart
    employment_type:
      label_fa: نوع استخدام
      preferred_visuals:
      - bar_chart
      - horizontal_bar_chart
    contract_type:
      label_fa: نوع قرارداد
      preferred_visuals:
      - horizontal_bar_chart
      - table
    is_contractor:
      label_fa: پیمانکاری
      preferred_visuals:
      - kpi_card
      - pie_chart
    service_domain:
      label_fa: حوزه خدمت
      preferred_visuals:
      - bar_chart
      - horizontal_bar_chart
    department_name:
      label_fa: واحد / دپارتمان
      preferred_visuals:
      - horizontal_bar_chart
      - table
    province:
      label_fa: استان
      preferred_visuals:
      - horizontal_bar_chart
      - table
    site_name:
      label_fa: محل خدمت
      preferred_visuals:
      - horizontal_bar_chart
      - table
    position_title:
      label_fa: عنوان پست
      preferred_visuals:
      - horizontal_bar_chart
      - table
    position_level:
      label_fa: سطح پست
      preferred_visuals:
      - bar_chart
    job_family:
      label_fa: خانواده شغلی
      preferred_visuals:
      - bar_chart
      - horizontal_bar_chart
    hire_year:
      label_fa: سال جذب
      preferred_visuals:
      - line_chart
      ordered: true
    criticality_level:
      label_fa: سطح حساسیت
      preferred_visuals:
      - bar_chart
      - table
  metric_columns:
    employee_count:
      label_fa: تعداد کارکنان
      format: integer
    actual_headcount:
      label_fa: نیروی موجود
      format: integer
    approved_headcount:
      label_fa: چارت مصوب
      format: integer
    headcount_gap:
      label_fa: اختلاف نیرو
      format: integer_with_sign
    average_age:
      label_fa: میانگین سن
      format: decimal_2
      suffix_fa: سال
    average_service_years:
      label_fa: میانگین سابقه
      format: decimal_2
      suffix_fa: سال
    percentage:
      label_fa: درصد
      format: percentage_2_decimals
      suffix: '%'
    female_percentage:
      label_fa: درصد زنان
      format: percentage_2_decimals
      suffix: '%'
    male_percentage:
      label_fa: درصد مردان
      format: percentage_2_decimals
      suffix: '%'
    contractor_count:
      label_fa: تعداد نیروهای پیمانکاری
      format: integer
    contractor_percentage:
      label_fa: درصد پیمانکاری
      format: percentage_2_decimals
      suffix: '%'
    hiring_count:
      label_fa: تعداد جذب
      format: integer
  status_columns:
    status:
      label_fa: وضعیت
      format: status_code
    reason:
      label_fa: دلیل
      format: text
formatting_rules:
  locale: fa-IR
  direction: rtl
  number_format:
    integer:
      decimals: 0
      thousands_separator: true
    decimal_2:
      decimals: 2
      thousands_separator: true
    percentage_2_decimals:
      decimals: 2
      suffix: '%'
    integer_with_sign:
      decimals: 0
      show_positive_sign: true
      thousands_separator: true
  label_rules:
    use_fa_labels: true
    replace_null_with: نامشخص
    max_axis_label_chars: 32
    long_label_behavior: برای برچسب‌های طولانی از horizontal_bar_chart یا table استفاده شود.
    title_style: کوتاه، مدیریتی و فارسی
  color_semantics:
    default: use_frontend_default_palette
    positive_gap: frontend_positive_or_warning_palette
    negative_gap: frontend_risk_palette
    status_error: frontend_error_palette
    note: رنگ‌ها در این فایل hard-code نمی‌شوند و باید توسط Frontend theme تعیین شوند.
  sorting_defaults:
    counts: DESC
    percentages: DESC
    hire_year: ASC
    age_group: logical_age_order
    education_rank: ASC_or_DESC_based_on_question
    headcount_gap: ASC_for_shortage_first
response_composition_rules:
  default_answer_parts:
  - short_text_summary
  - primary_visualization
  - data_limitation_note_if_any
  kpi_answer_parts:
  - one_sentence_result
  - kpi_card
  - source_and_filter_note
  chart_answer_parts:
  - one_sentence_insight
  - chart
  - optional_table_if_user_asks
  table_answer_parts:
  - short_context
  - table
  - limitation_or_sort_note
  gap_answer_parts:
  - status_message
  - why_not_answerable
  - required_data_or_rule
  - gap_registration_note
  reject_answer_parts:
  - status_message
  - safe_reason
  - optional_supported_alternative
  do_not_include:
  - raw SQL in final answer unless user explicitly asks
  - raw employee-level records
  - sensitive personal identifiers
  - unverified managerial conclusions without data or RAG source
intent_visualization_map:
- intent: total_employee_count
  primary_visualization: kpi_card
  dimension: null
  metrics:
  - employee_count
  default_title_fa: تعداد کل کارکنان فعال
  fallback_visualization: table
- intent: employee_count_by_gender
  primary_visualization: pie_chart
  dimension: gender
  metrics:
  - employee_count
  - percentage
  default_title_fa: تعداد کارکنان به تفکیک جنسیت
  fallback_visualization: bar_chart
- intent: gender_percentage
  primary_visualization: kpi_card
  dimension: null
  metrics:
  - percentage
  default_title_fa: درصد کارکنان بر اساس جنسیت
  fallback_visualization: table
- intent: average_age
  primary_visualization: kpi_card
  dimension: null
  metrics:
  - average_age
  default_title_fa: میانگین سن کارکنان
  fallback_visualization: bar_chart
- intent: employee_count_by_age_group
  primary_visualization: bar_chart
  dimension: age_group_title
  metrics:
  - employee_count
  - percentage
  default_title_fa: تعداد کارکنان به تفکیک گروه سنی
  fallback_visualization: table
- intent: employee_count_by_age_filter
  primary_visualization: kpi_card
  dimension: null
  metrics:
  - employee_count
  default_title_fa: تعداد کارکنان در بازه سنی انتخاب‌شده
  fallback_visualization: table
- intent: employee_count_by_education
  primary_visualization: bar_chart
  dimension: education_title
  metrics:
  - employee_count
  - percentage
  default_title_fa: تعداد کارکنان بر اساس مدرک تحصیلی
  fallback_visualization: horizontal_bar_chart
- intent: most_common_education
  primary_visualization: kpi_card
  dimension: education_title
  metrics:
  - employee_count
  default_title_fa: بیشترین مدرک تحصیلی
  fallback_visualization: table
- intent: least_common_education
  primary_visualization: kpi_card
  dimension: education_title
  metrics:

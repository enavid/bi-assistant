  fallback_visualization: horizontal_bar_chart
- intent: employee_count_by_contract_type
  primary_visualization: horizontal_bar_chart
  dimension: contract_type
  metrics:
  - employee_count
  - percentage
  default_title_fa: تعداد کارکنان بر اساس نوع قرارداد
  fallback_visualization: table
- intent: contractor_share
  primary_visualization: kpi_card
  dimension: null
  metrics:
  - contractor_count
  - contractor_percentage
  default_title_fa: سهم نیروهای پیمانکاری
  fallback_visualization: kpi_card_group
- intent: contractor_share_by_service_domain
  primary_visualization: bar_chart
  dimension: service_domain
  metrics:

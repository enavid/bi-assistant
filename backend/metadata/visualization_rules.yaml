status_message_templates:
  DATA_GAP:
    title_fa: داده کافی نیست
    message_fa: این سؤال مرتبط با منابع انسانی است، اما در نسخه فعلی داده، قانون یا سند کافی برای پاسخ دقیق وجود ندارد.
    severity: warning
    recommended_action_fa: این مورد باید به‌عنوان Data Gap یا Knowledge Gap ثبت شود.
  ACCESS_DENIED:
    title_fa: امکان نمایش اطلاعات وجود ندارد
    message_fa: درخواست شامل اطلاعات فردی یا حساس کارکنان است و طبق سیاست محرمانگی قابل نمایش نیست.
    severity: error
    recommended_action_fa: می‌توان سؤال را به شکل تجمیعی و آماری بازنویسی کرد.
  OUT_OF_SCOPE:
    title_fa: خارج از دامنه منابع انسانی
    message_fa: این سؤال در دامنه HR BI Assistant نیست و نباید برای آن SQL منابع انسانی تولید شود.
    severity: info
    recommended_action_fa: سؤال باید به حوزه منابع انسانی، کارکنان، استخدام، قرارداد، تحصیلات، سن، جذب یا ساختار سازمانی مربوط
      باشد.
  NEEDS_CLARIFICATION:
    title_fa: نیاز به شفاف‌سازی سؤال
    message_fa: سؤال قابل پاسخ است، اما برای انتخاب شاخص، بازه یا سطح تحلیل نیاز به توضیح بیشتر دارد.
    severity: info
    recommended_action_fa: از کاربر یک سؤال کوتاه برای شفاف‌سازی پرسیده شود.
  SQL_VALIDATION_FAILED:
    title_fa: SQL معتبر نیست
    message_fa: کوئری تولیدشده با قوانین امنیتی یا ساختاری فاز دوم سازگار نیست و اجرا نمی‌شود.
    severity: error
    recommended_action_fa: سیستم باید کوئری را لاگ کند و پاسخ امن برگرداند.
  NO_DATA:
    title_fa: داده‌ای یافت نشد
    message_fa: برای فیلترهای انتخاب‌شده، رکورد قابل نمایش وجود ندارد.
    severity: info
    recommended_action_fa: می‌توان بازه یا فیلتر سؤال را تغییر داد.
chart_builder_output_schema:
  visualization_type: kpi_card | kpi_card_group | table | bar_chart | horizontal_bar_chart | stacked_bar_chart | line_chart
    | pie_chart | status_message
  title_fa: string
  subtitle_fa: string|null
  dimension_columns: array[string]
  metric_columns: array[string]
  x_axis: string|null
  y_axis: string|null
  series: array[string]
  sort: string|null
  top_n: integer|null
  show_percentage: boolean
  show_total: boolean
  formatting: object
  data_limitations: array[string]
  source: hr_mvp.vw_hr_employee_analytics
  fallback_visualization_type: string|null
validation_before_render:
  required_checks:
  - route must be SQL/GAP/REJECT
  - validation_status must allow visualization
  - query_result must not contain sensitive columns
  - query_result must not expose employee_id as visible dimension
  - row_count must be compatible with selected visualization
  - all metric columns must be numeric except status_message
  - line_chart x_axis must be ordered
  - pie_chart row_count must not exceed max_rows_recommended unless grouped into other
  - access policy suppression must be applied before rendering
  on_failed_check: status_message
  on_empty_result: status_message
notes_fa:
- این فایل فقط نوع نمایش را تعیین می‌کند و نباید منطق SQL یا سیاست امنیتی اصلی را جایگزین کند.
- برای فاز دوم، نمودارها باید ساده، قابل دفاع و مدیریتی باشند؛ داشبورد پیچیده لازم نیست.
- برای سؤال‌های تحلیلی بدون داده یا سند کافی، نمودار ساخته نشود و status_message برگردد.
- اگر کاربر جدول بخواهد، حتی برای داده قابل نمودار، table می‌تواند به عنوان خروجی اصلی یا مکمل استفاده شود.
- برای دمو، kpi_card، bar_chart، horizontal_bar_chart، line_chart، pie_chart و status_message کافی هستند.

disambiguation_rules:
- rule_id: DISAMBIG_001
  topic: نوع استخدام در برابر نوع قرارداد
  if_user_mentions:
  - نوع استخدام
  - وضعیت استخدام
  - رسمی
  - قراردادی
  - پیمانی
  default_mapping: employment_type
  override_when_user_mentions:
  - نوع قرارداد
  - قرارداد
  override_mapping: contract_type
  notes_fa: رسمی/قراردادی/پیمانی بدون عبارت نوع قرارداد باید به employment_type نگاشت شود.
- rule_id: DISAMBIG_002
  topic: پیمانکاری
  if_user_mentions:
  - پیمانکاری
  - نیروی پیمانکاری
  - سهم پیمانکاری
  default_mapping: is_contractor = TRUE
  alternate_mapping: employment_type = شاغل در پیمانکاری
  notes_fa: برای محاسبه سهم یا درصد پیمانکاری بهتر است از is_contractor استفاده شود.
- rule_id: DISAMBIG_003
  topic: کارشناسی
  if_user_mentions:
  - مدرک کارشناسی
  - لیسانس
  - تحصیلات کارشناسی
  default_mapping: education_title = کارشناسی
  override_when_user_mentions:
  - پست کارشناسی
  - نقش کارشناسی
  - کارشناس در پست
  override_mapping: is_expert_role = TRUE
  notes_fa: واژه کارشناسی هم می‌تواند مدرک باشد هم سطح پست؛ قرینه سؤال تعیین‌کننده است.
- rule_id: DISAMBIG_004
  topic: حوزه در برابر واحد/بخش
  if_user_mentions:
  - حوزه
  - حوزه خدمت
  - معاونت
  default_mapping: service_domain
  override_when_user_mentions:
  - واحد
  - بخش
  - اداره
  - دپارتمان
  override_mapping: department_name
  notes_fa: حوزه سطح کلان‌تر است؛ واحد/بخش/اداره به department_name نگاشت می‌شود.
- rule_id: DISAMBIG_005
  topic: محل خدمت
  if_user_mentions:
  - محل خدمت
  - لوکیشن
  - سایت
  default_mapping: site_name
  fallback_mapping: province
  notes_fa: اگر سؤال در سطح استان بود از province استفاده شود؛ اگر شهر خواسته شد DATA_GAP شود.
- rule_id: DISAMBIG_006
  topic: بیشترین/کمترین جذب
  if_user_mentions:
  - سال بیشترین جذب
  - سال کمترین جذب
  default_mapping: hire_year with grouped employee_count
  forbidden_mapping:
  - MAX(v.hire_year)
  - MIN(v.hire_year)
  notes_fa: بیشترین/کمترین جذب یعنی سالی که COUNT کارکنان جذب‌شده در آن بیشترین/کمترین است، نه بزرگ‌ترین/کوچک‌ترین سال.
- rule_id: DISAMBIG_007
  topic: بازنشستگی
  if_user_mentions:
  - آستانه بازنشستگی
  - نزدیک بازنشستگی
  default_mapping: DATA_GAP
  notes_fa: بدون قانون رسمی بازنشستگی نباید صرفاً با سن حدسی پاسخ تولید شود.
- rule_id: DISAMBIG_008
  topic: شهر
  if_user_mentions:
  - شهر
  - هر شهر
  - تحلیل شهری
  default_mapping: DATA_GAP
  notes_fa: ستون city وجود دارد اما در MVP فعلی قابل اتکا نیست.

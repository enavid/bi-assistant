global_notes_fa:
- این فایل جایگزین Data Dictionary نیست؛ روی آن یک لایه معنایی برای زبان کاربر می‌سازد.
- Semantic Mapper نباید ستون، مقدار یا شاخصی خارج از این فایل و Data Dictionary حدس بزند.
- نوع استخدام و نوع قرارداد باید جدا تفسیر شوند؛ این یکی از نقاط حساس فاز دوم است.
- کارشناسی در عبارت مدرک کارشناسی یعنی education_title، اما در عبارت پست کارشناسی یعنی is_expert_role.
- برای شهر، آستانه بازنشستگی، بهره‌وری پیمانکارها، نیاز آموزشی و هماهنگی جذب با رشد کار سازمان فعلاً DATA_GAP ثبت شود.
- برای اطلاعات فردی یا حساس کارکنان خروجی باید ACCESS_DENIED باشد.
- خروجی‌های مجاز در MVP باید تجمیعی باشند و نه فردی.

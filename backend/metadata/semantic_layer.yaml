version: '0.1'
project: HR BI Assistant
phase: Controlled SQL-based MVP
file_type: semantic_layer
language: fa-IR
description_fa: لایه نگاشت معنایی برای تبدیل واژه‌ها و اصطلاحات فارسی کاربر به ستون‌ها، فیلترها، شاخص‌ها، intentها و مسیرهای
  SQL/GAP/REJECT.
main_view:
  name: hr_mvp.vw_hr_employee_analytics
  alias: v
metadata_dependencies:
  data_dictionary: Template_00_data_dictionary.yaml
  intent_catalog: Template_01_intent_catalog.yaml
  report_catalog: Template_02_report_catalog.json
  sql_templates: Template_04_sql_templates.yaml
  sql_validator_rules: Template_05_sql_validator_rules.yaml
  access_policies: Template_08_access_policies.yaml
semantic_contract:
  purpose: semantic_mapper.py باید از این فایل برای نگاشت زبان کاربر به مفاهیم کنترل‌شده، ستون‌های View، intent و route استفاده
    کند.
  must_use_only_view: hr_mvp.vw_hr_employee_analytics v
  must_not_create_new_columns: true
  must_not_guess_allowed_values: true
  must_respect_data_gap_rules: true
  must_respect_privacy_rules: true
  default_filter: v.is_active = TRUE
  fallback_when_unknown: DATA_GAP یا CLARIFICATION_NEEDED بر اساس نوع ابهام
normalization_rules:
  normalize_arabic_persian_letters:
  - from: ي
    to: ی
  - from: ك
    to: ک
  - from: ة
    to: ه
  normalize_digits: Persian, Arabic and English digits must be converted to comparable numeric values before extracting filters.
  normalize_spacing: نیم‌فاصله، فاصله اضافه و علائم نگارشی نباید مانع تشخیص واژه شود.
  case_handling: English terms such as HR, IT, PHD should be matched case-insensitively.
  number_words_examples:
  - term_fa: سی
    number: 30
  - term_fa: چهل
    number: 40
  - term_fa: پنجاه
    number: 50
  - term_fa: شصت
    number: 60
  - term_fa: پانزده
    number: 15
question_type_mapping:
  statistical:
    title_fa: سؤال آماری
    route: SQL
    examples_fa:
    - تعداد کارکنان زن چند نفر است؟
    - تعداد کارکنان بر اساس مدرک تحصیلی چقدر است؟
    - چند نفر بالای ۶۰ سال هستند؟
  trend:
    title_fa: سؤال روندی
    route: SQL
    examples_fa:
    - روند جذب سالانه چگونه بوده؟
    - جذب ۱۵ سال اخیر چقدر بوده؟
  comparative:
    title_fa: سؤال مقایسه‌ای
    route: SQL
    examples_fa:
    - کدام حوزه بیشترین نیرو را دارد؟
    - کدام مدرک بیشترین سهم را دارد؟
  analytical_supported:
    title_fa: تحلیلی با داده کافی محدود
    route: SQL
    examples_fa:
    - کدام واحد کمبود نیرو دارد؟
    notes_fa: فقط اگر شاخص و ستون‌های لازم در View موجود باشد.
  analytical_gap:
    title_fa: تحلیلی با داده ناکافی
    route: GAP
    examples_fa:
    - آیا بهره‌وری پیمانکارها مناسب است؟
    - آیا جذب با افزایش حجم کار هماهنگ بوده؟
    notes_fa: اگر داده، تعریف شاخص یا سند تفسیری کافی وجود ندارد، Data Gap ثبت شود.
  sensitive_or_individual:
    title_fa: سؤال حساس یا فردی
    route: REJECT
    response_status: ACCESS_DENIED
    examples_fa:
    - نام و مشخصات کارکنان را نمایش بده
    - کد ملی کارکنان را بده
  out_of_scope:
    title_fa: خارج از دامنه HR
    route: REJECT
    response_status: OUT_OF_SCOPE
    examples_fa:
    - فروش ماه گذشته شرکت چقدر بوده؟
  ambiguous:
    title_fa: سؤال مبهم
    route: REJECT
    response_status: CLARIFICATION_NEEDED
    examples_fa:
    - گزارش بده
    - وضعیت را تحلیل کن
metric_mappings:
- metric_id: employee_count
  title_fa: تعداد کارکنان
  user_terms_fa:
  - تعداد
  - چند نفر
  - چندتا
  - سرجمع
  - هدکانت
  expression: COUNT(v.employee_id)
  default_alias: employee_count
  output_type: integer
- metric_id: percentage
  title_fa: درصد/سهم
  user_terms_fa:
  - درصد
  - سهم
  - نسبت
  - چند درصد
  expression_patterns:
  - ROUND(SUM(CASE WHEN condition THEN 1 ELSE 0 END) * 100.0 / NULLIF(COUNT(v.employee_id), 0), 2)
  - ROUND(COUNT(v.employee_id) * 100.0 / NULLIF(SUM(COUNT(v.employee_id)) OVER (), 0), 2)
  default_alias: percentage
  output_type: numeric
- metric_id: average_age
  title_fa: میانگین سن
  user_terms_fa:
  - میانگین سن
  - متوسط سن
  expression: ROUND(AVG(v.age), 2)
  default_alias: average_age
  output_type: numeric
- metric_id: average_service_years
  title_fa: میانگین سابقه
  user_terms_fa:
  - میانگین سابقه
  - متوسط سابقه
  - میانگین سنوات
  expression: ROUND(AVG(v.service_years), 2)
  default_alias: average_service_years
  output_type: numeric
- metric_id: actual_headcount
  title_fa: نیروی موجود
  user_terms_fa:
  - نیروی موجود
  - تعداد واقعی
  - کارکنان فعلی
  expression: COUNT(v.employee_id)
  default_alias: actual_headcount
  output_type: integer
- metric_id: approved_headcount
  title_fa: چارت مصوب
  user_terms_fa:
  - چارت مصوب
  - نیروی مصوب
  - ظرفیت مصوب
  expression: MAX(v.department_approved_headcount)
  default_alias: approved_headcount
  output_type: integer
- metric_id: headcount_gap
  title_fa: اختلاف نیرو
  user_terms_fa:
  - اختلاف نیرو
  - کمبود نیرو
  - مازاد نیرو
  expression: MAX(v.department_approved_headcount) - COUNT(v.employee_id)
  default_alias: headcount_gap
  output_type: integer
group_by_mappings:
- user_phrase: به تفکیک جنسیت
  column: gender
  sql: GROUP BY v.gender
  preferred_visualization: pie_chart_or_bar_chart
- user_phrase: به تفکیک وضعیت تأهل
  column: marital_status
  sql: GROUP BY v.marital_status
  preferred_visualization: bar_chart
- user_phrase: به تفکیک گروه سنی
  column: age_group_title
  sql: GROUP BY v.age_group_title
  preferred_visualization: bar_chart
- user_phrase: به تفکیک مدرک تحصیلی
  column: education_title
  sql: GROUP BY v.education_title
  preferred_visualization: bar_chart
- user_phrase: به تفکیک نوع استخدام
  column: employment_type
  sql: GROUP BY v.employment_type
  preferred_visualization: bar_chart
- user_phrase: به تفکیک نوع قرارداد
  column: contract_type
  sql: GROUP BY v.contract_type
  preferred_visualization: horizontal_bar_chart_or_table
- user_phrase: به تفکیک حوزه
  column: service_domain
  sql: GROUP BY v.service_domain
  preferred_visualization: bar_chart
- user_phrase: به تفکیک واحد/بخش/اداره/دپارتمان
  column: department_name
  sql: GROUP BY v.department_name
  preferred_visualization: horizontal_bar_chart_or_table
- user_phrase: به تفکیک استان
  column: province
  sql: GROUP BY v.province
  preferred_visualization: horizontal_bar_chart_or_table
- user_phrase: به تفکیک شهر
  column: city
  sql: DATA_GAP
  preferred_visualization: status_message
- user_phrase: به تفکیک محل خدمت
  column: site_name
  sql: GROUP BY v.site_name
  preferred_visualization: bar_chart_or_table
- user_phrase: به تفکیک پست
  column: position_title
  sql: GROUP BY v.position_title
  preferred_visualization: bar_chart_or_table
- user_phrase: به تفکیک سال جذب
  column: hire_year
  sql: GROUP BY v.hire_year ORDER BY v.hire_year ASC
  preferred_visualization: line_chart
semantic_concepts:

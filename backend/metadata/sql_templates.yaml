    \ * 100.0\n        / NULLIF(SUM(COUNT(v.employee_id)) OVER (), 0),\n        2\n    ) AS percentage\nFROM hr_mvp.vw_hr_employee_analytics\
    \ v\nWHERE v.is_active = TRUE\nGROUP BY v.age_group_title\nORDER BY MIN(v.age) ASC;\n"
- template_id: TPL_MOST_POPULATED_AGE_GROUP
  intent: most_populated_age_group
  title_fa: پرجمعیت‌ترین گروه سنی

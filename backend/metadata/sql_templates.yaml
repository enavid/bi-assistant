  sql: "SELECT\n    v.service_domain,\n    ROUND(AVG(v.age), 2) AS average_age\nFROM hr_mvp.vw_hr_employee_analytics v\nWHERE\
    \ v.is_active = TRUE\nGROUP BY v.service_domain\nORDER BY average_age DESC;\n"
- template_id: TPL_EMPLOYEE_COUNT_BY_AGE_GROUP
  report_id: RPT_HR_016
  intent: employee_count_by_age_group
  title_fa: تعداد کارکنان به تفکیک گروه سنی

- template_id: TPL_LOW_EDUCATION_IN_EXPERT_ROLES
  report_id: RPT_HR_020
  intent: low_education_in_expert_roles
  title_fa: تحصیلات پایین‌تر از حداقل نیاز پست کارشناسی
  route: SQL
  status: partial_supported
  output_type: kpi_card_or_table
  required_columns:
  - employee_id
  - education_rank
  - min_education_rank
  - is_expert_role
  - is_active
  result_columns:
  - name: low_education_expert_count
    type: integer
    title_fa: تعداد افراد با تحصیلات پایین‌تر از حداقل نیاز
  - name: total_expert_role_count
    type: integer
    title_fa: کل پست‌های کارشناسی
  - name: percentage
    type: numeric
    title_fa: درصد
  business_rules_fa: فقط زمانی قابل اتکا است که min_education_rank برای پست‌ها و education_rank برای مدارک کامل و صحیح باشد.
  sql: "SELECT\n    SUM(\n        CASE\n            WHEN v.is_expert_role = TRUE\n             AND v.education_rank IS NOT\
    \ NULL\n             AND v.min_education_rank IS NOT NULL\n             AND v.education_rank < v.min_education_rank\n\
    \            THEN 1 ELSE 0\n        END\n    ) AS low_education_expert_count,\n    SUM(CASE WHEN v.is_expert_role = TRUE\
    \ THEN 1 ELSE 0 END) AS total_expert_role_count,\n    ROUND(\n        SUM(\n            CASE\n                WHEN v.is_expert_role\
    \ = TRUE\n                 AND v.education_rank IS NOT NULL\n                 AND v.min_education_rank IS NOT NULL\n \
    \                AND v.education_rank < v.min_education_rank\n                THEN 1 ELSE 0\n            END\n       \
    \ ) * 100.0\n        / NULLIF(SUM(CASE WHEN v.is_expert_role = TRUE THEN 1 ELSE 0 END), 0),\n        2\n    ) AS percentage\n\
    FROM hr_mvp.vw_hr_employee_analytics v\nWHERE v.is_active = TRUE;\n"

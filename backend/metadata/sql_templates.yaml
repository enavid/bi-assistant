    type: numeric
    title_fa: درصد جنسیت هدف
  sql: "SELECT\n    v.employment_type,\n    COUNT(v.employee_id) AS total_count,\n\
    \    COUNT(CASE WHEN v.gender = '{gender_value}' THEN 1 END) AS target_gender_count,\n\
    \    ROUND(\n        COUNT(CASE WHEN v.gender = '{gender_value}' THEN 1 END) *\
    \ 100.0\n        / NULLIF(COUNT(v.employee_id), 0),\n        2\n    ) AS target_gender_percentage\n\
    FROM hr_mvp.vw_hr_employee_analytics v\nWHERE v.is_active = TRUE\nGROUP BY v.employment_type\n\
    ORDER BY v.employment_type;\n"

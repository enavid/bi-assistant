- template_id: TPL_EMPLOYMENT_TYPE_BY_AGE_FILTER
  intent: employee_count_by_age_filter
  title_fa: توزیع نوع استخدام در فیلتر سنی
  route: SQL
  status: ready_for_demo
  output_type: table_or_bar_chart
  required_columns:
  - employee_id
  - age
  - employment_type
  - is_active
  parameters:
  - name: age_min
    type: integer_or_NULL
    required: false
    default: 'NULL'
  - name: age_max_exclusive
    type: integer_or_NULL
    required: false
    default: 'NULL'
  - name: age_max_inclusive
    type: integer_or_NULL
    required: false
    default: 'NULL'
  result_columns:
  - name: employment_type
    type: text
    title_fa: نوع استخدام
  - name: employee_count
    type: integer
    title_fa: تعداد کارکنان
  sql: "SELECT\n    v.employment_type,\n    COUNT(v.employee_id) AS employee_count\nFROM\
    \ hr_mvp.vw_hr_employee_analytics v\nWHERE v.is_active = TRUE\n  AND ({age_min}\
    \ IS NULL OR v.age >= {age_min})\n  AND ({age_max_exclusive} IS NULL OR v.age\
    \ < {age_max_exclusive})\n  AND ({age_max_inclusive} IS NULL OR v.age <= {age_max_inclusive})\n\
    GROUP BY v.employment_type\nORDER BY employee_count DESC;\n"
- template_id: TPL_NEAR_RETIREMENT_5_YEARS
  route: SQL
  status: ready_for_demo
  title_fa: تعداد کارکنان در آستانه بازنشستگی (ظرف ۵ سال)
  output_type: scalar
  required_columns:
  - employee_id
  - age
  - service_years
  - gender
  - is_active
  sql: "SELECT COUNT(v.employee_id) AS near_retirement_count\nFROM hr_mvp.vw_hr_employee_analytics\
    \ v\nWHERE v.is_active = TRUE\n  AND (\n    (v.gender = 'زن'  AND v.age\
    \ >= 50)\n    OR (v.gender = 'مرد' AND v.age >= 55)\n    OR (v.gender\
    \ = 'زن'  AND v.service_years >= 25)\n    OR (v.gender = 'مر\
    د' AND v.service_years >= 30)\n  );\n"
- template_id: TPL_NEAR_RETIREMENT_BY_SERVICE_DOMAIN
  intent: near_retirement_analysis
  title_fa: تعداد کارکنان نزدیک بازنشستگی به تفکیک حوزه سازمانی
  route: SQL
  status: ready_for_demo
  output_type: table_or_bar_chart
  required_columns:
  - employee_id
  - age
  - service_domain
  - is_active
  result_columns:
  - name: service_domain
    type: text
    title_fa: حوزه سازمانی
  - name: near_retirement_count
    type: integer
    title_fa: تعداد در آستانه بازنشستگی
  sql: "SELECT\n    v.service_domain,\n    COUNT(v.employee_id) AS near_retirement_count\n\
    FROM hr_mvp.vw_hr_employee_analytics v\nWHERE v.is_active = TRUE\n  AND v.age\
    \ >= 55\nGROUP BY v.service_domain\nORDER BY near_retirement_count DESC;\n"

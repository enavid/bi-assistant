status_templates:
- template_id: TPL_DATA_GAP
  route: GAP
  status: DATA_GAP
  title_fa: داده یا قانون کافی برای پاسخ وجود ندارد
  when_to_use_fa: برای سؤال‌های مرتبط با منابع انسانی که در MVP فعلی داده، سند، قانون یا شاخص کافی ندارند.
  sql: 'SELECT ''DATA_GAP'' AS status;

    '
- template_id: TPL_ACCESS_DENIED
  route: REJECT
  status: ACCESS_DENIED
  title_fa: عدم دسترسی به اطلاعات فردی یا حساس
  when_to_use_fa: برای درخواست نام، مشخصات، کد ملی، شماره پرسنلی، اطلاعات فردی یا خروجی ردیفی کارکنان.
  sql: 'SELECT ''ACCESS_DENIED'' AS status;

    '
- template_id: TPL_OUT_OF_SCOPE
  route: REJECT
  status: OUT_OF_SCOPE
  title_fa: سؤال خارج از دامنه منابع انسانی
  when_to_use_fa: برای سؤال‌هایی که به HR مربوط نیستند؛ مثل فروش، مالی غیر HR، مشتری، محصول یا عملیات غیر منابع انسانی.
  sql: 'SELECT ''OUT_OF_SCOPE'' AS status;

    '
- template_id: TPL_NEEDS_CLARIFICATION
  route: REJECT
  status: NEEDS_CLARIFICATION
  title_fa: سؤال مبهم و نیازمند شفاف‌سازی
  when_to_use_fa: برای سؤال‌های HR که مبهم‌اند و بدون شفاف‌سازی ممکن است SQL اشتباه تولید شود.
  sql: 'SELECT ''NEEDS_CLARIFICATION'' AS status;

    '
gap_and_reject_mapping:
  city_level_analysis: TPL_DATA_GAP
  near_retirement_analysis: TPL_DATA_GAP
  workforce_aging_trend_analysis: TPL_DATA_GAP
  education_training_need_analysis: TPL_DATA_GAP
  department_balance_analysis: TPL_DATA_GAP
  contractor_productivity_analysis: TPL_DATA_GAP
  employment_stability_impact_analysis: TPL_DATA_GAP
  hiring_business_growth_alignment: TPL_DATA_GAP
  individual_employee_info: TPL_ACCESS_DENIED
  out_of_scope: TPL_OUT_OF_SCOPE
  ambiguous_hr_question: TPL_NEEDS_CLARIFICATION
notes_fa:
- این فایل باید با report_catalog.json و intent_catalog.yaml هم‌نام و هم‌راستا بماند.
- اگر برای یک سؤال Template آماده وجود داشت، sql_template_engine.py باید Template را به SQL آزاد ترجیح دهد.
- اگر Template مناسب وجود نداشت، SQL Generator محدود فقط روی View مجاز است و خروجی آن باید از SQL Validator عبور کند.
- برای سؤال‌های Data Gap نباید SQL حدسی ساخته شود؛ باید TPL_DATA_GAP برگردد.
- برای اطلاعات فردی کارکنان، TPL_ACCESS_DENIED برگردد.
- برای شهر، بازنشستگی، بهره‌وری پیمانکارها و تحلیل‌های مدیریتی بدون داده/سند، مسیر GAP است.

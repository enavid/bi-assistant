version: '1.0'
project: HR BI Assistant
phase: Controlled SQL-based MVP
file_type: sql_templates
language: fa-IR
description_fa: کتابخانه SQL Templateهای امن، View-based و قابل اعتبارسنجی برای گزارش‌ها و intentهای پرتکرار منابع انسانی
  در فاز دوم.
main_view:
  name: hr_mvp.vw_hr_employee_analytics
  schema: hr_mvp
  alias: v
  database: PostgreSQL
  row_grain: one_row_per_active_employee
  default_filter: v.is_active = TRUE
metadata_dependencies:
  data_dictionary: Template_00_data_dictionary.yaml
  intent_catalog: Template_01_intent_catalog.yaml
  report_catalog: Template_02_report_catalog.json
  semantic_layer: Template_03_semantic_layer.yaml
  sql_validator_rules: Template_05_sql_validator_rules.yaml
  visualization_rules: Template_06_visualization_rules.yaml
  access_policies: Template_08_access_policies.yaml
  evaluation_goldset: Template_07_HR_BI_Assistant_Evaluation.json
template_contract:
  purpose_fa: sql_template_engine.py باید ابتدا intent/report_id را به template_id وصل کند، پارامترهای امن را جایگذاری کند
    و سپس SQL را به sql_validator.py بدهد.
  view_only: true
  allowed_source: hr_mvp.vw_hr_employee_analytics v
  raw_tables_allowed: false
  joins_allowed_for_templates: false
  select_star_allowed: false
  write_operations_allowed: false
  individual_employee_rows_allowed: false
  employee_id_visibility: employee_id فقط داخل COUNT مجاز است و نباید به عنوان خروجی فردی برگردد.
  status_sql_outputs:
  - SELECT 'DATA_GAP' AS status;
  - SELECT 'ACCESS_DENIED' AS status;
  - SELECT 'OUT_OF_SCOPE' AS status;
  - SELECT 'NEEDS_CLARIFICATION' AS status;
global_sql_rules:
  must_be_single_statement: true
  must_be_select_only: true
  with_allowed_only_when_final_statement_is_select: true
  must_use_schema_prefix: hr_mvp
  must_use_alias: v
  must_use_only_view: hr_mvp.vw_hr_employee_analytics v
  must_not_use_join: true
  must_not_use_raw_tables:
  - hr_employees
  - hr_contracts
  - hr_employee_education
  - hr_education_levels
  - hr_departments
  - hr_positions
  - hr_locations
  - hr_age_groups
  - hr_workforce_targets
  must_not_use_select_star: true
  default_where_clause: v.is_active = TRUE
  count_expression: COUNT(v.employee_id) AS employee_count
  average_age_expression: ROUND(AVG(v.age), 2) AS average_age
  average_service_years_expression: ROUND(AVG(v.service_years), 2) AS average_service_years
  percentage_rule: همه درصدها باید NULLIF در مخرج داشته باشند.
  approved_headcount_rule: برای چارت مصوب در سطح دپارتمان از MAX(v.department_approved_headcount) استفاده شود و روی ردیف‌های
    کارکنان SUM مستقیم انجام نشود.
parameter_policy:
  interpolation_allowed_only_for_whitelisted_parameters: true
  string_parameters_must_be_allowed_values: true
  numeric_parameters_must_be_cast_and_range_checked: true
  raw_sql_condition_parameter_allowed: false
  current_shamsi_year_source: application
  current_shamsi_year_default_for_mvp_test: 1404
  missing_optional_numeric_parameter_value: 'NULL'
  notes_fa: پارامترها نباید مستقیماً از متن کاربر داخل SQL تزریق شوند؛ semantic_mapper و backend باید آن‌ها را normalize و
    whitelist کنند.
template_aliases:
  TPL_PERCENTAGE_OF_WOMEN: TPL_GENDER_PERCENTAGE
  TPL_CONTRACTOR_SHARE_OVERALL: TPL_CONTRACTOR_SHARE
  TPL_EMPLOYEES_AGE_60_PLUS_STATIC: TPL_EMPLOYEES_AGE_60_PLUS
  TPL_EMPLOYEES_UNDER_30_STATIC: TPL_EMPLOYEES_UNDER_30
template_index:
  by_report_id:
    RPT_HR_001: TPL_TOTAL_EMPLOYEE_COUNT
    RPT_HR_002: TPL_EMPLOYEE_COUNT_BY_GENDER
    RPT_HR_015: TPL_GENDER_PERCENTAGE
    RPT_HR_003: TPL_AVERAGE_AGE
    RPT_HR_016: TPL_EMPLOYEE_COUNT_BY_AGE_GROUP
    RPT_HR_017: TPL_EMPLOYEE_COUNT_BY_AGE_FILTER
    RPT_HR_004: TPL_EMPLOYEE_COUNT_BY_EDUCATION
    RPT_HR_018: TPL_MOST_COMMON_EDUCATION
    RPT_HR_019: TPL_LEAST_COMMON_EDUCATION
    RPT_HR_020: TPL_LOW_EDUCATION_IN_EXPERT_ROLES
    RPT_HR_005: TPL_EMPLOYEE_COUNT_BY_EMPLOYMENT_TYPE
    RPT_HR_006: TPL_EMPLOYEE_COUNT_BY_CONTRACT_TYPE
    RPT_HR_007: TPL_CONTRACTOR_SHARE
    RPT_HR_021: TPL_CONTRACTOR_SHARE_BY_SERVICE_DOMAIN
    RPT_HR_008: TPL_EMPLOYEE_COUNT_BY_SERVICE_DOMAIN
    RPT_HR_022: TPL_EMPLOYEE_COUNT_BY_DEPARTMENT
    RPT_HR_012: TPL_HEADCOUNT_GAP_BY_DEPARTMENT
    RPT_HR_009: TPL_EMPLOYEE_COUNT_BY_PROVINCE
    RPT_HR_023: TPL_EMPLOYEE_COUNT_BY_WORK_LOCATION
    RPT_HR_010: TPL_HIRING_TREND_ANNUAL
    RPT_HR_011: TPL_HIRING_LAST_15_YEARS
    RPT_HR_024: TPL_MOST_HIRING_YEAR
    RPT_HR_025: TPL_LEAST_HIRING_YEAR
    RPT_HR_026: TPL_HIRING_BY_CONTRACT_TYPE_RECENT_YEAR
    RPT_HR_027: TPL_AVERAGE_SERVICE_YEARS
    RPT_HR_028: TPL_EMPLOYEE_COUNT_WITHOUT_SERVICE_YEARS
    RPT_HR_029: TPL_EMPLOYEE_COUNT_BY_MARITAL_STATUS
    RPT_HR_030: TPL_GENDER_BY_AGE_GROUP
    RPT_HR_040: TPL_CONTRACTOR_SHARE_BY_DEPARTMENT
    RPT_HR_041: TPL_HEADCOUNT_GAP_BY_SERVICE_DOMAIN
    RPT_HR_042: TPL_EDUCATION_BY_SERVICE_DOMAIN
  by_intent:
    total_employee_count:
    - TPL_TOTAL_EMPLOYEE_COUNT
    employee_count_by_gender:
    - TPL_EMPLOYEE_COUNT_BY_GENDER
    gender_percentage:
    - TPL_GENDER_PERCENTAGE
    average_age:
    - TPL_AVERAGE_AGE
    - TPL_AVERAGE_AGE_BY_GENDER
    - TPL_AVERAGE_AGE_BY_SERVICE_DOMAIN
    employee_count_by_age_group:
    - TPL_EMPLOYEE_COUNT_BY_AGE_GROUP
    employee_count_by_age_filter:
    - TPL_EMPLOYEE_COUNT_BY_AGE_FILTER
    - TPL_EMPLOYEES_AGE_60_PLUS
    - TPL_EMPLOYEES_UNDER_30
    employee_count_by_education:
    - TPL_EMPLOYEE_COUNT_BY_EDUCATION
    - TPL_EMPLOYEE_COUNT_BY_EDUCATION_VALUE
    most_common_education:
    - TPL_MOST_COMMON_EDUCATION
    least_common_education:
    - TPL_LEAST_COMMON_EDUCATION
    low_education_in_expert_roles:
    - TPL_LOW_EDUCATION_IN_EXPERT_ROLES
    employee_count_by_employment_type:
    - TPL_EMPLOYEE_COUNT_BY_EMPLOYMENT_TYPE
    - TPL_EMPLOYEE_COUNT_BY_EMPLOYMENT_TYPE_VALUE
    employee_count_by_contract_type:
    - TPL_EMPLOYEE_COUNT_BY_CONTRACT_TYPE
    - TPL_EMPLOYEE_COUNT_BY_CONTRACT_TYPE_VALUE
    contractor_share:
    - TPL_CONTRACTOR_SHARE
    contractor_share_by_service_domain:
    - TPL_CONTRACTOR_SHARE_BY_SERVICE_DOMAIN
    contractor_share_by_department: TPL_CONTRACTOR_SHARE_BY_DEPARTMENT
    employee_count_by_service_domain:
    - TPL_EMPLOYEE_COUNT_BY_SERVICE_DOMAIN
    employee_count_by_department:
    - TPL_EMPLOYEE_COUNT_BY_DEPARTMENT
    headcount_gap_by_department:
    - TPL_HEADCOUNT_GAP_BY_DEPARTMENT
    headcount_gap_by_service_domain: TPL_HEADCOUNT_GAP_BY_SERVICE_DOMAIN
    employee_count_by_province:
    - TPL_EMPLOYEE_COUNT_BY_PROVINCE
    employee_count_by_work_location:
    - TPL_EMPLOYEE_COUNT_BY_WORK_LOCATION
    hiring_trend_annual:
    - TPL_HIRING_TREND_ANNUAL
    hiring_last_15_years:
    - TPL_HIRING_LAST_15_YEARS
    most_or_least_hiring_year:
    - TPL_MOST_HIRING_YEAR
    - TPL_LEAST_HIRING_YEAR
    hiring_by_contract_type_recent_year:
    - TPL_HIRING_BY_CONTRACT_TYPE_RECENT_YEAR
    average_service_years:
    - TPL_AVERAGE_SERVICE_YEARS
    employee_count_without_service_years:
    - TPL_EMPLOYEE_COUNT_WITHOUT_SERVICE_YEARS
    employee_count_by_marital_status:
    - TPL_EMPLOYEE_COUNT_BY_MARITAL_STATUS
    employee_count_by_gender_age_filter:
    - TPL_GENDER_BY_AGE_GROUP
    education_distribution_by_service_domain: TPL_EDUCATION_BY_SERVICE_DOMAIN
    education_by_service_domain: TPL_EDUCATION_BY_SERVICE_DOMAIN
    monthly_hiring_trend: TPL_DATA_GAP
templates:
- template_id: TPL_TOTAL_EMPLOYEE_COUNT
  report_id: RPT_HR_001
  intent: total_employee_count
  title_fa: تعداد کل کارکنان فعال
  route: SQL
  status: ready_for_demo
  output_type: kpi_card
  required_columns:
  - employee_id
  - is_active
  result_columns:
  - name: employee_count
    type: integer
    title_fa: تعداد کارکنان
  when_to_use_fa: وقتی سؤال درباره تعداد کل کارکنان فعال باشد.
  sql: "SELECT\n    COUNT(v.employee_id) AS employee_count\nFROM hr_mvp.vw_hr_employee_analytics v\nWHERE v.is_active = TRUE;\n"
- template_id: TPL_EMPLOYEE_COUNT_BY_GENDER
  report_id: RPT_HR_002
  intent: employee_count_by_gender
  title_fa: تعداد کارکنان به تفکیک جنسیت
  route: SQL
  status: ready_for_demo
  output_type: table_or_pie_chart
  required_columns:
  - employee_id
  - gender
  - is_active
  result_columns:
  - name: gender
    type: text
    title_fa: جنسیت
  - name: employee_count
    type: integer
    title_fa: تعداد کارکنان
  - name: percentage
    type: numeric
    title_fa: درصد
  sql: "SELECT\n    v.gender,\n    COUNT(v.employee_id) AS employee_count,\n    ROUND(\n        COUNT(v.employee_id) * 100.0\n\
    \        / NULLIF(SUM(COUNT(v.employee_id)) OVER (), 0),\n        2\n    ) AS percentage\nFROM hr_mvp.vw_hr_employee_analytics\
    \ v\nWHERE v.is_active = TRUE\nGROUP BY v.gender\nORDER BY employee_count DESC;\n"
- template_id: TPL_GENDER_PERCENTAGE
  report_id: RPT_HR_015
  intent: gender_percentage
  title_fa: درصد کارکنان زن یا مرد
  route: SQL
  status: ready_for_demo
  output_type: kpi_card
  required_columns:
  - employee_id
  - gender
  - is_active
  parameters:
  - name: gender_value
    type: string
    required: true
    allowed_values:
    - زن
    - مرد
    source: intent_parser_or_semantic_mapper
    notes_fa: مقدار باید قبل از جایگذاری توسط backend از allowed_values / semantic_layer / data_dictionary تأیید شود.
  result_columns:
  - name: matched_employee_count
    type: integer
    title_fa: تعداد جنسیت انتخاب‌شده
  - name: total_employee_count
    type: integer
    title_fa: کل کارکنان
  - name: percentage
    type: numeric
    title_fa: درصد
  sql: "SELECT\n    SUM(CASE WHEN v.gender = '{gender_value}' THEN 1 ELSE 0 END) AS matched_employee_count,\n    COUNT(v.employee_id)\
    \ AS total_employee_count,\n    ROUND(\n        SUM(CASE WHEN v.gender = '{gender_value}' THEN 1 ELSE 0 END) * 100.0\n\
    \        / NULLIF(COUNT(v.employee_id), 0),\n        2\n    ) AS percentage\nFROM hr_mvp.vw_hr_employee_analytics v\n\
    WHERE v.is_active = TRUE;\n"
- template_id: TPL_AVERAGE_AGE
  report_id: RPT_HR_003
  intent: average_age
  title_fa: میانگین سن کارکنان
  route: SQL
  status: ready_for_demo
  output_type: kpi_card
  required_columns:
  - age
  - is_active
  parameters:
  - name: contractor_only
    type: boolean_or_NULL
    required: false
    default: 'NULL'
  - name: gender_value
    type: text_or_NULL
    required: false
    default: 'NULL'
  - name: education_title
    type: text_or_NULL
    required: false
    default: 'NULL'
  result_columns:
  - name: average_age
    type: numeric
    title_fa: میانگین سن
  sql: "SELECT\n    ROUND(AVG(v.age), 2) AS average_age\nFROM hr_mvp.vw_hr_employee_analytics\
    \ v\nWHERE v.is_active = TRUE\n  AND ({contractor_only} IS NULL OR v.is_contractor\
    \ = {contractor_only})\n  AND ({gender_value} IS NULL OR v.gender = {gender_value})\n\
    \  AND ({education_title} IS NULL OR v.education_title = {education_title});\n"
- template_id: TPL_AVERAGE_AGE_BY_GENDER
  intent: average_age
  title_fa: میانگین سن به تفکیک جنسیت
  route: SQL
  status: ready_for_demo
  output_type: table_or_bar_chart
  required_columns:
  - age
  - gender
  - is_active
  result_columns:
  - name: gender
    type: text
    title_fa: جنسیت
  - name: average_age
    type: numeric
    title_fa: میانگین سن
  sql: "SELECT\n    v.gender,\n    ROUND(AVG(v.age), 2) AS average_age\nFROM hr_mvp.vw_hr_employee_analytics v\nWHERE v.is_active\
    \ = TRUE\nGROUP BY v.gender\nORDER BY average_age DESC;\n"
- template_id: TPL_AVERAGE_AGE_BY_SERVICE_DOMAIN
  intent: average_age
  title_fa: میانگین سن به تفکیک حوزه خدمت
  route: SQL
  status: optional_supported
  output_type: table_or_bar_chart
  required_columns:
  - age
  - service_domain
  - is_active
  result_columns:
  - name: service_domain
    type: text
    title_fa: حوزه خدمت
  - name: average_age
    type: numeric
    title_fa: میانگین سن
  sql: "SELECT\n    v.service_domain,\n    ROUND(AVG(v.age), 2) AS average_age\nFROM hr_mvp.vw_hr_employee_analytics v\nWHERE\
    \ v.is_active = TRUE\nGROUP BY v.service_domain\nORDER BY average_age DESC;\n"
- template_id: TPL_EMPLOYEE_COUNT_BY_AGE_GROUP
  report_id: RPT_HR_016
  intent: employee_count_by_age_group
  title_fa: تعداد کارکنان به تفکیک گروه سنی
  route: SQL
  status: ready_for_demo
  output_type: table_or_bar_chart
  required_columns:
  - employee_id
  - age
  - age_group_title
  - is_active
  result_columns:
  - name: age_group_title
    type: text
    title_fa: گروه سنی
  - name: employee_count
    type: integer
    title_fa: تعداد کارکنان
  - name: percentage
    type: numeric
    title_fa: درصد
  sql: "SELECT\n    v.age_group_title,\n    COUNT(v.employee_id) AS employee_count,\n    ROUND(\n        COUNT(v.employee_id)\
    \ * 100.0\n        / NULLIF(SUM(COUNT(v.employee_id)) OVER (), 0),\n        2\n    ) AS percentage\nFROM hr_mvp.vw_hr_employee_analytics\
    \ v\nWHERE v.is_active = TRUE\nGROUP BY v.age_group_title\nORDER BY MIN(v.age) ASC;\n"
- template_id: TPL_MAX_AGE
  intent: max_age
  title_fa: بیشترین سن کارکنان
  route: SQL
  status: ready_for_demo
  output_type: kpi_card
  required_columns:
  - age
  - is_active
  result_columns:
  - name: max_age
    type: integer
    title_fa: بیشترین سن
  sql: "SELECT MAX(v.age) AS max_age\nFROM hr_mvp.vw_hr_employee_analytics v\nWHERE v.is_active = TRUE;\n"
- template_id: TPL_MIN_AGE
  intent: min_age
  title_fa: کمترین سن کارکنان
  route: SQL
  status: ready_for_demo
  output_type: kpi_card
  required_columns:
  - age
  - is_active
  result_columns:
  - name: min_age
    type: integer
    title_fa: کمترین سن
  sql: "SELECT MIN(v.age) AS min_age\nFROM hr_mvp.vw_hr_employee_analytics v\nWHERE v.is_active = TRUE;\n"
- template_id: TPL_STDDEV_AGE
  intent: stddev_age
  title_fa: انحراف معیار سن کارکنان
  route: SQL
  status: ready_for_demo
  output_type: kpi_card
  required_columns:
  - age
  - is_active
  result_columns:
  - name: stddev_age
    type: numeric
    title_fa: انحراف معیار سن
  sql: "SELECT ROUND(STDDEV(v.age)::numeric, 2) AS stddev_age\nFROM hr_mvp.vw_hr_employee_analytics v\nWHERE v.is_active = TRUE;\n"
- template_id: TPL_EMPLOYEE_COUNT_BY_AGE_FILTER
  report_id: RPT_HR_017
  intent: employee_count_by_age_filter
  title_fa: تعداد کارکنان بر اساس بازه سنی
  route: SQL
  status: ready_for_demo
  output_type: kpi_card
  required_columns:
  - employee_id
  - age
  - is_active
  parameters:
  - name: age_min
    type: integer_or_NULL
    required: false
    default: 'NULL'
    notes_fa: برای ۶۰ سال به بالا مقدار 60 و برای زیر ۳۰ مقدار NULL.
  - name: age_max_exclusive
    type: integer_or_NULL
    required: false
    default: 'NULL'
    notes_fa: برای زیر ۳۰ مقدار 30؛ شرط به شکل age < 30 اعمال می‌شود.
  - name: age_max_inclusive
    type: integer_or_NULL
    required: false
    default: 'NULL'
    notes_fa: برای بازه‌های شامل انتها استفاده شود؛ در حالت عادی NULL.
  result_columns:
  - name: employee_count
    type: integer
    title_fa: تعداد کارکنان
  sql: "SELECT\n    COUNT(v.employee_id) AS employee_count\nFROM hr_mvp.vw_hr_employee_analytics v\nWHERE v.is_active = TRUE\n\
    \  AND ({age_min} IS NULL OR v.age >= {age_min})\n  AND ({age_max_exclusive} IS NULL OR v.age < {age_max_exclusive})\n\
    \  AND ({age_max_inclusive} IS NULL OR v.age <= {age_max_inclusive});\n"
- template_id: TPL_EMPLOYEES_AGE_60_PLUS
  intent: employee_count_by_age_filter
  title_fa: تعداد کارکنان ۶۰ سال به بالا
  route: SQL
  status: shortcut_template
  output_type: kpi_card
  required_columns:
  - employee_id
  - age
  - is_active
  notes_fa: میانبر برای سؤال‌های پرتکرار Goldset؛ معادل TPL_EMPLOYEE_COUNT_BY_AGE_FILTER با age_min=60 است.
  sql: "SELECT\n    COUNT(v.employee_id) AS employee_count\nFROM hr_mvp.vw_hr_employee_analytics v\nWHERE v.is_active = TRUE\n\
    \  AND v.age >= 60;\n"
- template_id: TPL_EMPLOYEES_UNDER_30
  intent: employee_count_by_age_filter
  title_fa: تعداد کارکنان زیر ۳۰ سال
  route: SQL
  status: shortcut_template
  output_type: kpi_card
  required_columns:
  - employee_id
  - age
  - is_active
  notes_fa: میانبر برای سؤال‌های پرتکرار Goldset؛ معادل TPL_EMPLOYEE_COUNT_BY_AGE_FILTER با age_max_exclusive=30 است.
  sql: "SELECT\n    COUNT(v.employee_id) AS employee_count\nFROM hr_mvp.vw_hr_employee_analytics v\nWHERE v.is_active = TRUE\n\
    \  AND v.age < 30;\n"
- template_id: TPL_EMPLOYEE_COUNT_BY_EDUCATION
  report_id: RPT_HR_004
  intent: employee_count_by_education
  title_fa: تعداد کارکنان به تفکیک مدرک تحصیلی
  route: SQL
  status: ready_for_demo
  output_type: table_or_bar_chart
  required_columns:
  - employee_id
  - education_title
  - education_rank
  - is_active
  result_columns:
  - name: education_title
    type: text
    title_fa: مدرک تحصیلی
  - name: employee_count
    type: integer
    title_fa: تعداد کارکنان
  - name: percentage
    type: numeric
    title_fa: درصد
  sql: "SELECT\n    v.education_title,\n    COUNT(v.employee_id) AS employee_count,\n    ROUND(\n        COUNT(v.employee_id)\
    \ * 100.0\n        / NULLIF(SUM(COUNT(v.employee_id)) OVER (), 0),\n        2\n    ) AS percentage\nFROM hr_mvp.vw_hr_employee_analytics\
    \ v\nWHERE v.is_active = TRUE\nGROUP BY v.education_title, v.education_rank\nORDER BY v.education_rank ASC;\n"
- template_id: TPL_EMPLOYEE_COUNT_BY_EDUCATION_VALUE
  intent: employee_count_by_education
  title_fa: تعداد کارکنان با یک مدرک تحصیلی مشخص
  route: SQL
  status: ready_for_demo
  output_type: kpi_card
  required_columns:
  - employee_id
  - education_title
  - is_active
  parameters:
  - name: education_title
    type: string
    required: true
    allowed_values_source: data_dictionary.education_title.allowed_values
    notes_fa: مقدار باید قبل از جایگذاری توسط backend از allowed_values / semantic_layer / data_dictionary تأیید شود.
  result_columns:
  - name: employee_count
    type: integer
    title_fa: تعداد کارکنان
  sql: "SELECT\n    COUNT(v.employee_id) AS employee_count\nFROM hr_mvp.vw_hr_employee_analytics v\nWHERE v.is_active = TRUE\n\
    \  AND v.education_title = '{education_title}';\n"
- template_id: TPL_MOST_COMMON_EDUCATION
  report_id: RPT_HR_018
  intent: most_common_education
  title_fa: بیشترین مدرک تحصیلی
  route: SQL
  status: ready_for_demo
  output_type: kpi_card_or_table
  required_columns:
  - employee_id
  - education_title
  - is_active
  result_columns:
  - name: education_title
    type: text
    title_fa: مدرک تحصیلی
  - name: employee_count
    type: integer
    title_fa: تعداد کارکنان
  sql: "SELECT\n    v.education_title,\n    COUNT(v.employee_id) AS employee_count\nFROM hr_mvp.vw_hr_employee_analytics v\n\

  title_fa: درصد کارکنان زن در هر نوع استخدام
  route: SQL
  status: ready_for_demo
  output_type: table_or_bar_chart
  required_columns:
  - employee_id
  - employment_type
  - gender
  - is_active
  parameters:
  - name: gender_value
    type: string
    required: false
    default: "زن"
  result_columns:
  - name: employment_type
    type: text
    title_fa: نوع استخدام
  - name: total_count
    type: integer
    title_fa: کل کارکنان
  - name: target_gender_count
    type: integer
    title_fa: تعداد جنسیت هدف

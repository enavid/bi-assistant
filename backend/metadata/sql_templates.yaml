version: '1.0'
project: HR BI Assistant
phase: Controlled SQL-based MVP
file_type: sql_templates
language: fa-IR
description_fa: کتابخانه SQL Templateهای امن، View-based و قابل اعتبارسنجی برای گزارش‌ها و intentهای پرتکرار منابع انسانی
  در فاز دوم.
main_view:
  name: hr_mvp.vw_hr_employee_analytics
  schema: hr_mvp
  alias: v
  database: PostgreSQL
  row_grain: one_row_per_active_employee
  default_filter: v.is_active = TRUE
metadata_dependencies:
  data_dictionary: Template_00_data_dictionary.yaml
  intent_catalog: Template_01_intent_catalog.yaml
  report_catalog: Template_02_report_catalog.json
  semantic_layer: Template_03_semantic_layer.yaml
  sql_validator_rules: Template_05_sql_validator_rules.yaml
  visualization_rules: Template_06_visualization_rules.yaml
  access_policies: Template_08_access_policies.yaml
  evaluation_goldset: Template_07_HR_BI_Assistant_Evaluation.json
template_contract:
  purpose_fa: sql_template_engine.py باید ابتدا intent/report_id را به template_id وصل کند، پارامترهای امن را جایگذاری کند
    و سپس SQL را به sql_validator.py بدهد.
  view_only: true
  allowed_source: hr_mvp.vw_hr_employee_analytics v
  raw_tables_allowed: false
  joins_allowed_for_templates: false
  select_star_allowed: false
  write_operations_allowed: false
  individual_employee_rows_allowed: false
  employee_id_visibility: employee_id فقط داخل COUNT مجاز است و نباید به عنوان خروجی فردی برگردد.
  status_sql_outputs:
  - SELECT 'DATA_GAP' AS status;
  - SELECT 'ACCESS_DENIED' AS status;
  - SELECT 'OUT_OF_SCOPE' AS status;
  - SELECT 'NEEDS_CLARIFICATION' AS status;
global_sql_rules:
  must_be_single_statement: true
  must_be_select_only: true
  with_allowed_only_when_final_statement_is_select: true
  must_use_schema_prefix: hr_mvp
  must_use_alias: v
  must_use_only_view: hr_mvp.vw_hr_employee_analytics v
  must_not_use_join: true
  must_not_use_raw_tables:
  - hr_employees
  - hr_contracts
  - hr_employee_education
  - hr_education_levels
  - hr_departments
  - hr_positions
  - hr_locations
  - hr_age_groups
  - hr_workforce_targets
  must_not_use_select_star: true
  default_where_clause: v.is_active = TRUE
  count_expression: COUNT(v.employee_id) AS employee_count
  average_age_expression: ROUND(AVG(v.age), 2) AS average_age
  average_service_years_expression: ROUND(AVG(v.service_years), 2) AS average_service_years
  percentage_rule: همه درصدها باید NULLIF در مخرج داشته باشند.
  approved_headcount_rule: برای چارت مصوب در سطح دپارتمان از MAX(v.department_approved_headcount) استفاده شود و روی ردیف‌های
    کارکنان SUM مستقیم انجام نشود.
parameter_policy:
  interpolation_allowed_only_for_whitelisted_parameters: true
  string_parameters_must_be_allowed_values: true
  numeric_parameters_must_be_cast_and_range_checked: true
  raw_sql_condition_parameter_allowed: false
  current_shamsi_year_source: application
  current_shamsi_year_default_for_mvp_test: 1404
  missing_optional_numeric_parameter_value: 'NULL'
  notes_fa: پارامترها نباید مستقیماً از متن کاربر داخل SQL تزریق شوند؛ semantic_mapper و backend باید آن‌ها را normalize و
    whitelist کنند.

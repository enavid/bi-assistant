  - name: employee_count
    type: integer
    title_fa: تعداد کارکنان
  sql: "SELECT\n    v.age_group_title,\n    COUNT(v.employee_id) AS employee_count\nFROM hr_mvp.vw_hr_employee_analytics v\nWHERE v.is_active = TRUE\nGROUP BY v.age_group_title\nORDER BY employee_count DESC\nLIMIT 1;\n"

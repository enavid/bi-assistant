  when_to_use_fa: برای سؤال‌های HR که مبهم‌اند و بدون شفاف‌سازی ممکن است SQL اشتباه تولید شود.
  sql: 'SELECT ''NEEDS_CLARIFICATION'' AS status;

    '
- template_id: TPL_EMPLOYEE_COUNT_BY_POSITION
  report_id: RPT_HR_043
  intent: employee_count_by_position
  title_fa: تعداد کارکنان به تفکیک پست سازمانی
  route: SQL
  status: ready_for_demo
  output_type: table_or_horizontal_bar_chart
  required_columns:
  - employee_id
  - position_title
  - is_active
  business_rules_fa: برای تفکیک پست از GROUP BY v.position_title استفاده می‌شود.
  parameters:
  - name: result_limit
    type: integer_or_NULL
    required: false
    default: 'NULL'
  sql: "SELECT\n    v.position_title,\n    COUNT(v.employee_id) AS employee_count\nFROM hr_mvp.vw_hr_employee_analytics\
    \ v\nWHERE v.is_active = TRUE\nGROUP BY v.position_title\nORDER BY employee_count DESC\nLIMIT {result_limit};\n"
- template_id: TPL_MOST_POPULATED_POSITION
  report_id: RPT_HR_044
  intent: most_populated_position
  title_fa: پرمتصدی‌ترین پست سازمانی
  route: SQL
  status: ready_for_demo
  output_type: kpi_card
  required_columns:
  - employee_id
  - position_title
  - is_active
  result_columns:
  - name: position_title
    type: text
    title_fa: پست سازمانی
  - name: employee_count
    type: integer
    title_fa: تعداد کارکنان
  sql: "SELECT\n    v.position_title,\n    COUNT(v.employee_id) AS employee_count\nFROM hr_mvp.vw_hr_employee_analytics v\nWHERE v.is_active = TRUE\nGROUP BY v.position_title\nORDER BY employee_count DESC\nLIMIT 1;\n"
- template_id: TPL_EMPLOYEE_COUNT_BY_POSITION_LEVEL
  report_id: RPT_HR_045
  intent: employee_count_by_position_level
  title_fa: تعداد کارکنان به تفکیک سطح پست
  route: SQL
  status: ready_for_demo
  output_type: table_or_horizontal_bar_chart
  required_columns:
  - employee_id
  - position_level
  - is_active
  business_rules_fa: برای تفکیک سطح پست از GROUP BY v.position_level استفاده می‌شود.
  sql: "SELECT\n    v.position_level,\n    COUNT(v.employee_id) AS employee_count\nFROM hr_mvp.vw_hr_employee_analytics\
    \ v\nWHERE v.is_active = TRUE\nGROUP BY v.position_level\nORDER BY v.position_level;\n"
- template_id: TPL_EMPLOYEE_COUNT_CONTRACT_ENDING_SOON
  intent: employee_count_contract_ending_soon
  title_fa: تعداد کارکنانی که قرارداد آن‌ها تا یک سال آینده پایان می‌یابد
  route: SQL
  status: supported
  output_type: kpi_card
  required_columns:
  - employee_id
  - contract_end_date
  - is_active
  notes_fa: contract_end_date فقط به‌صورت فیلتر (نه ستون قابل‌نمایش) استفاده می‌شود؛
    بازه ۱۲ ماه آینده از تاریخ جاری در نظر گرفته می‌شود (نه سال شمسی، چون تبدیل
    تقویم شمسی در View وجود ندارد).
  sql: "SELECT\n    COUNT(v.employee_id) AS employee_count\nFROM hr_mvp.vw_hr_employee_analytics\
    \ v\nWHERE v.is_active = TRUE\n  AND v.contract_end_date BETWEEN CURRENT_DATE AND CURRENT_DATE + INTERVAL '1 year';\n"
- template_id: TPL_EMPLOYEE_COUNT_BY_BIRTH_SHAMSI_MONTH
  intent: employee_count_by_birth_month
  title_fa: تعداد کارکنان متولد یک ماه/فصل شمسی خاص
  route: SQL
  status: supported
  output_type: kpi_card
  required_columns:
  - employee_id
  - birth_date
  - is_active
  parameters:
  - name: shamsi_month_min
    type: integer
    required: true
    notes_fa: شماره ماه شمسی شروع بازه (۱ تا ۱۲). برای یک ماه خاص برابر shamsi_month_max است.
  - name: shamsi_month_max
    type: integer
    required: true
    notes_fa: شماره ماه شمسی پایان بازه (۱ تا ۱۲).
  notes_fa: birth_date فقط به‌صورت فیلتر (نه ستون قابل‌نمایش) از طریق تابع
    hr_mvp.shamsi_month استفاده می‌شود؛ این تابع تاریخ میلادی را به ماه تقویم شمسی
    تبدیل می‌کند.
  sql: "SELECT\n    COUNT(v.employee_id) AS employee_count\nFROM hr_mvp.vw_hr_employee_analytics\
    \ v\nWHERE v.is_active = TRUE\n  AND hr_mvp.shamsi_month(v.birth_date) BETWEEN {shamsi_month_min} AND {shamsi_month_max};\n"
- template_id: TPL_EMPLOYEE_COUNT_BY_HIRE_SHAMSI_MONTH
  intent: employee_count_by_hire_month
  title_fa: تعداد کارکنان استخدام‌شده در یک ماه/فصل شمسی خاص
  route: SQL
  status: supported
  output_type: kpi_card
  required_columns:
  - employee_id
  - hire_date
  - is_active
  parameters:
  - name: shamsi_month_min
    type: integer
    required: true
    notes_fa: شماره ماه شمسی شروع بازه (۱ تا ۱۲). برای یک ماه خاص برابر shamsi_month_max است.
  - name: shamsi_month_max
    type: integer
    required: true
    notes_fa: شماره ماه شمسی پایان بازه (۱ تا ۱۲).
  notes_fa: hire_date فقط به‌صورت فیلتر (نه ستون قابل‌نمایش) از طریق تابع
    hr_mvp.shamsi_month استفاده می‌شود.
  sql: "SELECT\n    COUNT(v.employee_id) AS employee_count\nFROM hr_mvp.vw_hr_employee_analytics\
    \ v\nWHERE v.is_active = TRUE\n  AND hr_mvp.shamsi_month(v.hire_date) BETWEEN {shamsi_month_min} AND {shamsi_month_max};\n"
- template_id: TPL_CONTRACT_ENDING_TREND_ANNUAL
  intent: contract_ending_trend_annual
  title_fa: روند سالانه پایان قرارداد (شمسی)
  route: SQL
  status: supported
  output_type: line_chart
  required_columns:
  - employee_id
  - contract_end_date
  - is_active
  notes_fa: تنها سال شمسی پایان قرارداد نمایش داده می‌شود (نه تاریخ دقیق)، از طریق
    hr_mvp.shamsi_year. این داده فقط شامل قرارداد جاری هر کارمند است؛ تاریخچه‌ی
    تمدیدهای قبلی نگهداری نمی‌شود، پس روند معمولاً به ۱-۲ سال آینده محدود است.
  sql: "SELECT\n    hr_mvp.shamsi_year(v.contract_end_date) AS contract_end_shamsi_year,\n\
    \    COUNT(v.employee_id) AS employee_count\nFROM hr_mvp.vw_hr_employee_analytics\
    \ v\nWHERE v.is_active = TRUE\n  AND v.contract_end_date IS NOT NULL\nGROUP BY 1\nORDER BY 1 ASC;\n"
- template_id: TPL_EMPLOYEE_COUNT_HIRED_LAST_MONTH
  intent: employee_count_hired_last_month
  title_fa: تعداد کارکنان جذب‌شده در ماه شمسی گذشته
  route: SQL
  status: supported
  output_type: kpi_card
  required_columns:
  - employee_id
  - hire_date
  - is_active
  notes_fa: بازه‌ی ماه شمسی قبل از ماه جاری با hr_mvp.shamsi_year/shamsi_month
    (روی CURRENT_DATE) محاسبه و با hr_mvp.shamsi_to_gregorian (تابع برعکس) به
    بازه‌ی تاریخ میلادی تبدیل می‌شود؛ hire_date فقط به‌صورت فیلتر استفاده می‌شود.
    بدون JOIN/CTE نوشته شده چون SQLValidator هرگونه JOIN را مسدود می‌کند.
  sql: "SELECT\n    COUNT(v.employee_id) AS employee_count\nFROM hr_mvp.vw_hr_employee_analytics\
    \ v\nWHERE v.is_active = TRUE\n  AND v.hire_date >= hr_mvp.shamsi_to_gregorian(\n\
    \        CASE WHEN hr_mvp.shamsi_month(CURRENT_DATE) = 1 THEN hr_mvp.shamsi_year(CURRENT_DATE)\
    \ - 1 ELSE hr_mvp.shamsi_year(CURRENT_DATE) END,\n        CASE WHEN hr_mvp.shamsi_month(CURRENT_DATE)\
    \ = 1 THEN 12 ELSE hr_mvp.shamsi_month(CURRENT_DATE) - 1 END,\n        1)\n  AND\
    \ v.hire_date < hr_mvp.shamsi_to_gregorian(hr_mvp.shamsi_year(CURRENT_DATE), hr_mvp.shamsi_month(CURRENT_DATE),\
    \ 1);\n"
gap_and_reject_mapping:
  city_level_analysis: TPL_DATA_GAP

  workforce_aging_trend_analysis: TPL_DATA_GAP
  education_training_need_analysis: TPL_DATA_GAP
  department_balance_analysis: TPL_DATA_GAP
  contractor_productivity_analysis: TPL_DATA_GAP
  employment_stability_impact_analysis: TPL_DATA_GAP
  hiring_business_growth_alignment: TPL_DATA_GAP
  individual_employee_info: TPL_ACCESS_DENIED
  out_of_scope: TPL_OUT_OF_SCOPE
  ambiguous_hr_question: TPL_NEEDS_CLARIFICATION
notes_fa:
- این فایل باید با report_catalog.json و intent_catalog.yaml هم‌نام و هم‌راستا بماند.
- اگر برای یک سؤال Template آماده وجود داشت، sql_template_engine.py باید Template را به SQL آزاد ترجیح دهد.
- اگر Template مناسب وجود نداشت، SQL Generator محدود فقط روی View مجاز است و خروجی آن باید از SQL Validator عبور کند.
- برای سؤال‌های Data Gap نباید SQL حدسی ساخته شود؛ باید TPL_DATA_GAP برگردد.
- برای اطلاعات فردی کارکنان، TPL_ACCESS_DENIED برگردد.
- برای شهر، بازنشستگی، بهره‌وری پیمانکارها و تحلیل‌های مدیریتی بدون داده/سند، مسیر GAP است.

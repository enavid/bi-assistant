- template_id: TPL_AVERAGE_AGE_BY_DEPARTMENT
  intent: avg_age_by_department
  title_fa: میانگین سن کارکنان در هر دپارتمان
  route: SQL
  status: ready_for_demo
  output_type: table
  required_columns:
  - age
  - department_name
  - employee_id
  - is_active
  sql: "SELECT\n    v.department_name,\n    ROUND(AVG(v.age), 2) AS average_age,\n\
    \    COUNT(v.employee_id) AS employee_count\nFROM hr_mvp.vw_hr_employee_analytics\
    \ v\nWHERE v.is_active = TRUE\nGROUP BY v.department_name\nORDER BY v.department_name;\n"
- template_id: TPL_EMPLOYEE_COUNT_BY_AGE_FILTER_AND_DEPARTMENT
  intent: employee_count_by_age_filter_by_department
  title_fa: تعداد کارکنان با فیلتر سنی در هر دپارتمان
  route: SQL
  status: ready_for_demo
  output_type: table
  required_columns:
  - age
  - department_name
  - employee_id
  - is_active
  parameters:
  - name: age_min
    type: integer_or_NULL
    required: false
    default: 'NULL'
  - name: age_max_exclusive
    type: integer_or_NULL
    required: false
    default: 'NULL'
  - name: age_max_inclusive
    type: integer_or_NULL
    required: false
    default: 'NULL'
  sql: "SELECT\n    v.department_name,\n    COUNT(v.employee_id) AS employee_count\n\
    FROM hr_mvp.vw_hr_employee_analytics v\nWHERE v.is_active = TRUE\n  AND ({age_min}\
    \ IS NULL OR v.age >= {age_min})\n  AND ({age_max_exclusive} IS NULL OR v.age\
    \ < {age_max_exclusive})\n  AND ({age_max_inclusive} IS NULL OR v.age <= {age_max_inclusive})\n\
    GROUP BY v.department_name\nORDER BY employee_count DESC;\n"
- template_id: TPL_EMPLOYEE_COUNT_BY_DEPARTMENT_AND_EMPLOYMENT_TYPE

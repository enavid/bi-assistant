- template_id: TPL_HEADCOUNT_GAP_BY_DEPARTMENT
  report_id: RPT_HR_012
  intent: headcount_gap_by_department
  title_fa: اختلاف نیروی موجود با چارت مصوب در سطح واحد
  route: SQL
  status: partial_supported
  output_type: table
  required_columns:
  - employee_id
  - department_id
  - department_name
  - department_approved_headcount
  - is_active
  business_rules_fa: مقدار مثبت headcount_gap یعنی کمبود نیرو. department_approved_headcount نباید روی ردیف‌های کارکنان SUM
    شود.
  sql: "SELECT\n    v.department_id,\n    v.department_name,\n    COUNT(v.employee_id) AS actual_headcount,\n    MAX(v.department_approved_headcount)\
    \ AS approved_headcount,\n    MAX(v.department_approved_headcount) - COUNT(v.employee_id) AS headcount_gap\nFROM hr_mvp.vw_hr_employee_analytics\
    \ v\nWHERE v.is_active = TRUE\nGROUP BY v.department_id, v.department_name\nORDER BY headcount_gap DESC, actual_headcount\
    \ DESC;\n"
- template_id: TPL_HEADCOUNT_GAP_BY_SERVICE_DOMAIN
  intent: headcount_gap_by_service_domain
  title_fa: اختلاف نیروی موجود با چارت مصوب در سطح حوزه
  route: SQL
  status: partial_supported
  output_type: table
  required_columns:
  - employee_id
  - department_id
  - department_name
  - service_domain
  - department_approved_headcount
  - is_active
  business_rules_fa: ابتدا در سطح department_id تجمیع می‌شود تا چارت مصوب تکراری جمع نشود. WITH مجاز است چون خروجی نهایی SELECT
    است.
  sql: "WITH department_level AS (\n    SELECT\n        v.service_domain,\n        v.department_id,\n        COUNT(v.employee_id)\
    \ AS actual_headcount,\n        MAX(v.department_approved_headcount) AS approved_headcount\n    FROM hr_mvp.vw_hr_employee_analytics\
    \ v\n    WHERE v.is_active = TRUE\n    GROUP BY v.service_domain, v.department_id\n)\nSELECT\n    service_domain,\n  \
    \  SUM(actual_headcount) AS actual_headcount,\n    SUM(approved_headcount) AS approved_headcount,\n    SUM(approved_headcount)\
    \ - SUM(actual_headcount) AS headcount_gap\nFROM department_level\nGROUP BY service_domain\nORDER BY headcount_gap DESC,\
    \ actual_headcount DESC;\n"
  report_id: RPT_HR_041

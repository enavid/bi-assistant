  status: DATA_GAP
  title_fa: داده یا قانون کافی برای پاسخ وجود ندارد
  when_to_use_fa: برای سؤال‌های مرتبط با منابع انسانی که در MVP فعلی داده، سند، قانون یا شاخص کافی ندارند.
  sql: 'SELECT ''DATA_GAP'' AS status;

    '

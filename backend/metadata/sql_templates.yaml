  - name: service_years_max_inclusive
    type: integer_or_NULL
    required: false
    default: 'NULL'
  sql: "SELECT\n    COUNT(v.employee_id) AS employee_count\nFROM hr_mvp.vw_hr_employee_analytics\
    \ v\nWHERE v.is_active = TRUE\n  AND ({service_years_min} IS NULL OR v.service_years\
    \ >= {service_years_min})\n  AND ({service_years_max_exclusive} IS NULL OR v.service_years\
    \ < {service_years_max_exclusive})\n  AND ({service_years_max_inclusive} IS NULL\
    \ OR v.service_years <= {service_years_max_inclusive});\n"
- template_id: TPL_EMPLOYEE_COUNT_BY_HIRE_YEAR
  intent: employee_count_by_hire_year
  title_fa: تعداد کارکنان استخدام‌شده در یک سال شمسی
  route: SQL
  status: ready_for_demo
  output_type: kpi_card
  required_columns:
  - employee_id
  - hire_year
  - is_active
  parameters:
  - name: hire_year
    type: integer_or_NULL
    required: false
    default: 'NULL'
  sql: "SELECT\n    COUNT(v.employee_id) AS employee_count\nFROM hr_mvp.vw_hr_employee_analytics\
    \ v\nWHERE v.is_active = TRUE\n  AND ({hire_year} IS NULL OR v.hire_year = {hire_year});\n"
- template_id: TPL_EMPLOYEE_COUNT_BY_MARITAL_STATUS
  report_id: RPT_HR_029
  intent: employee_count_by_marital_status
  title_fa: تعداد کارکنان به تفکیک وضعیت تأهل
  route: SQL
  status: ready_for_demo
  output_type: table_or_pie_chart
  required_columns:
  - employee_id
  - marital_status
  - is_active
  sql: "SELECT\n    v.marital_status,\n    COUNT(v.employee_id) AS employee_count,\n    ROUND(\n        COUNT(v.employee_id)\
    \ * 100.0\n        / NULLIF(SUM(COUNT(v.employee_id)) OVER (), 0),\n        2\n    ) AS percentage\nFROM hr_mvp.vw_hr_employee_analytics\
    \ v\nWHERE v.is_active = TRUE\nGROUP BY v.marital_status\nORDER BY employee_count DESC;\n"
- template_id: TPL_GENDER_BY_AGE_GROUP
  report_id: RPT_HR_030
  intent: employee_count_by_gender_age_filter
  title_fa: توزیع جنسیت در گروه‌های سنی
  route: SQL
  status: ready_for_demo
  output_type: table_or_grouped_bar_chart
  required_columns:
  - employee_id
  - gender
  - age
  - age_group_title
  - is_active
  business_rules_fa: برای سؤال‌های «در بازه سنی چند زن/مرد حضور دارند» می‌توان این Template را با فیلتر سنی تکمیلی در نسخه
    بعدی توسعه داد.
  sql: "SELECT\n    v.age_group_title,\n    v.gender,\n    COUNT(v.employee_id) AS employee_count\nFROM hr_mvp.vw_hr_employee_analytics\
    \ v\nWHERE v.is_active = TRUE\nGROUP BY v.age_group_title, v.gender\nORDER BY MIN(v.age) ASC, v.gender;\n"

version: '1.0'
project: HR BI Assistant
phase: Controlled SQL-based MVP
file_type: access_policies
language: fa-IR
description_fa: قوانین دسترسی، محرمانگی، حداقل‌سازی داده و سطح نمایش خروجی برای HR BI Assistant در فاز دوم. این فایل باید
  توسط Access Control، Privacy Guard، SQL Validator، Query Executor، Response Builder، Logger و Evaluation Service استفاده
  شود.
main_view:
  name: hr_mvp.vw_hr_employee_analytics
  alias: v
  allowed_for_llm_sql: true
  allowed_access_mode: aggregated_reporting_only
  notes_fa: در MVP، مدل فقط مجاز است روی این View و فقط برای گزارش‌های تجمیعی SQL تولید کند. جدول‌های خام نباید در اختیار
    مدل قرار بگیرند.
metadata_dependencies:
- Template_00_data_dictionary.yaml
- Template_01_intent_catalog.yaml
- Template_02_report_catalog.json
- Template_03_semantic_layer.yaml
- Template_04_sql_templates.yaml
- Template_05_sql_validator_rules.yaml
- Template_06_visualization_rules.yaml
- Template_07_HR_BI_Assistant_Evaluation.json
access_policy_contract:
  policy_engine_name: hr_bi_access_policy_engine
  applies_to:
  - domain_classifier.py
  - question_validator.py
  - intent_parser.py
  - semantic_mapper.py
  - router.py
  - sql_template_engine.py
  - sql_generator.py
  - sql_validator.py
  - query_executor.py
  - response_builder.py
  - chart_builder.py
  - logger.py
  - evaluation_service.py
  primary_goal_fa: جلوگیری از افشای اطلاعات فردی یا حساس کارکنان و محدود کردن پاسخ‌ها به خروجی‌های تجمیعی قابل دفاع.
  default_decision: deny_unless_explicitly_allowed
  decision_values:
  - ALLOW
  - DENY
  - ALLOW_STATUS_ONLY
  - NEEDS_CLARIFICATION
  status_values:
  - ALLOWED
  - ACCESS_DENIED
  - DATA_GAP
  - OUT_OF_SCOPE
  - NEEDS_CLARIFICATION
  - POLICY_VIOLATION
  must_be_enforced_in_backend: true
  prompt_rules_are_not_sufficient: true
  policy_priority_order:
  - SECURITY_AND_PRIVACY
  - ROLE_PERMISSION
  - DATA_SOURCE_PERMISSION
  - COLUMN_PERMISSION
  - AGGREGATION_AND_SUPPRESSION
  - QUERY_ROUTE_PERMISSION
  - RESPONSE_RENDERING_PERMISSION
default_policy:
  output_level: aggregated_only
  allow_individual_employee_output: false
  allow_sensitive_personal_data: false
  allow_raw_table_access_for_llm: false
  allow_raw_table_access_for_sql_generator: false
  allow_export_personal_data: false
  allow_select_star: false
  allow_join: false
  allow_multiple_statements: false
  allow_unvalidated_sql_execution: false
  allow_guessing_when_data_missing: false
  default_denial_status: ACCESS_DENIED
  default_data_gap_status: DATA_GAP
  default_out_of_scope_status: OUT_OF_SCOPE
  default_clarification_status: NEEDS_CLARIFICATION
data_classification_levels:
- level: PUBLIC
  title_fa: عمومی
  description_fa: اطلاعاتی که افشای آن ریسک پرسنلی ندارد.
  examples:
  - نام شاخص
  - تعریف گزارش
  - نوع نمودار پیشنهادی
  allowed_in_response: true
- level: INTERNAL
  title_fa: داخلی سازمانی
  description_fa: اطلاعات عملیاتی یا متادیتا که برای سیستم لازم است ولی نباید بی‌دلیل نمایش داده شود.
  examples:
  - report_id
  - sql_template_id
  - policy_rule_id
  - internal_column_name
  allowed_in_response: limited
- level: AGGREGATED_HR
  title_fa: منابع انسانی تجمیعی
  description_fa: آمار و شاخص‌های منابع انسانی در سطح گروه، واحد، حوزه، استان یا کل سازمان.
  examples:
  - تعداد کارکنان
  - میانگین سن
  - سهم پیمانکاری
  - روند جذب سالانه
  allowed_in_response: true
- level: RESTRICTED_PERSONAL
  title_fa: فردی محدود
  description_fa: اطلاعات سطح کارمند که حتی اگر حساس مستقیم نباشد، می‌تواند فرد را قابل شناسایی کند.
  examples:
  - employee_id
  - birth_date
  - hire_date
  - contract_start_date
  - contract_end_date
  allowed_in_response: false
- level: SENSITIVE_PERSONAL
  title_fa: حساس فردی
  description_fa: اطلاعات هویتی، تماس، مالی، بیمه‌ای، حقوقی یا پرونده‌ای کارکنان.
  examples:
  - national_id
  - personnel_number
  - first_name
  - last_name
  - phone_number
  - salary
  - bank_account
  allowed_in_response: false
data_sources:
  allowed_sources:
  - name: hr_mvp.vw_hr_employee_analytics
    alias: v
    type: analytics_view
    access_level: aggregated_reporting
    allowed_for_sql_generation: true
    allowed_for_query_execution: true
    allowed_for_llm_context: schema_only
    allowed_output_level: aggregated_only
    notes_fa: تنها منبع مجاز SQL در فاز دوم. این View باید فاقد نام، کد ملی و اطلاعات تماس باشد.
  blocked_sources:
  - name: hr_mvp.hr_employees
    type: raw_table
    reason_fa: جدول خام کارکنان است و ممکن است اطلاعات فردی داشته باشد.
  - name: hr_mvp.hr_contracts
    type: raw_table
    reason_fa: جدول خام قراردادها است؛ قرارداد جاری داخل View حل شده است.
  - name: hr_mvp.hr_employee_education
    type: raw_table
    reason_fa: جدول خام سوابق تحصیلی است؛ آخرین مدرک داخل View حل شده است.
  - name: hr_mvp.hr_education_levels
    type: raw_table
    reason_fa: Join مستقیم به جدول مرجع تحصیلات برای مدل مجاز نیست.
  - name: hr_mvp.hr_departments
    type: raw_table
    reason_fa: Join مستقیم به جدول ساختار سازمانی در MVP مجاز نیست.
  - name: hr_mvp.hr_locations
    type: raw_table
    reason_fa: Join مستقیم به جدول محل خدمت در MVP مجاز نیست.
  - name: hr_mvp.hr_positions
    type: raw_table
    reason_fa: Join مستقیم به جدول پست‌ها در MVP مجاز نیست.
  - name: hr_mvp.hr_age_groups
    type: raw_table
    reason_fa: گروه سنی داخل View حل شده است.
  - name: hr_mvp.hr_workforce_targets
    type: raw_table
    reason_fa: چارت مصوب مورد نیاز در View به‌صورت کنترل‌شده موجود است.
  - name: information_schema
    type: system_schema
    reason_fa: دسترسی به متادیتای پایگاه داده برای مدل مجاز نیست.
  - name: pg_catalog
    type: system_schema
    reason_fa: دسترسی به کاتالوگ داخلی PostgreSQL برای مدل مجاز نیست.
sensitive_columns:
  personal_identity:
  - national_id
  - personnel_number
  - first_name
  - last_name
  - full_name
  - father_name
  - birth_certificate_number
  - personal_identifier
  - passport_number
  contact_info:
  - phone_number
  - mobile
  - email
  - address
  - postal_code
  financial_info:
  - bank_account
  - iban
  - salary
  - wage
  - bonus
  - loan
  - tax_info
  - payroll_amount
  insurance_and_legal:
  - insurance_number
  - medical_record
  - disability_status
  - legal_case
  - court_case
  private_hr_info:
  - disciplinary_record
  - performance_score_individual
  - evaluation_score_individual
  - termination_reason
  - absence_detail_individual
  - complaint_record
  free_text_risk_columns:
  - notes
  - description
  - comment
  - attachment_text
restricted_columns_in_view:
- column: employee_id
  classification: RESTRICTED_PERSONAL
  allowed_usage:
  - COUNT
  - COUNT_DISTINCT_INTERNAL_CHECK
  disallowed_usage:
  - SELECT_VISIBLE
  - GROUP_BY_INDIVIDUAL
  - ORDER_BY_INDIVIDUAL
  - FILTER_FOR_SPECIFIC_EMPLOYEE
  - EXPORT
  reason_fa: شناسه داخلی فقط برای شمارش مجاز است و نباید در خروجی دیده شود.
- column: birth_date
  classification: RESTRICTED_PERSONAL
  allowed_usage:
  - AGE_CALCULATION_INSIDE_VIEW
  - AGGREGATED_AGE_ANALYSIS
  disallowed_usage:
  - SELECT_VISIBLE
  - GROUP_BY_EXACT_DATE
  - EXPORT
  reason_fa: تاریخ تولد می‌تواند فرد را قابل شناسایی کند؛ برای تحلیل از age و age_group_title استفاده شود.
- column: hire_date
  classification: RESTRICTED_PERSONAL
  allowed_usage:
  - AGGREGATED_HIRING_ANALYSIS_IF_NEEDED
  disallowed_usage:
  - SELECT_VISIBLE
  - GROUP_BY_EXACT_DATE
  - EXPORT
  reason_fa: تاریخ جذب فردی نباید نمایش داده شود؛ برای روند جذب از hire_year استفاده شود.
- column: contract_start_date
  classification: RESTRICTED_PERSONAL
  allowed_usage:
  - AGGREGATED_CONTRACT_ANALYSIS_IF_NEEDED
  disallowed_usage:
  - SELECT_VISIBLE
  - GROUP_BY_EXACT_DATE
  - EXPORT
  reason_fa: تاریخ شروع قرارداد فردی نباید نمایش داده شود.
- column: contract_end_date
  classification: RESTRICTED_PERSONAL
  allowed_usage:
  - AGGREGATED_CONTRACT_ANALYSIS_IF_NEEDED
  disallowed_usage:
  - SELECT_VISIBLE
  - GROUP_BY_EXACT_DATE
  - EXPORT
  reason_fa: تاریخ پایان قرارداد فردی نباید نمایش داده شود.
- column: department_id
  classification: INTERNAL
  allowed_usage:
  - GROUP_BY_WITH_DEPARTMENT_NAME
  - JOIN_ALREADY_RESOLVED_IN_VIEW
  - AGGREGATION_INTERNAL
  disallowed_usage:
  - VISIBLE_OUTPUT_WITHOUT_NAME
  - EXPORT_RAW_IDENTIFIER
  reason_fa: شناسه واحد فقط برای aggregation داخلی مجاز است؛ خروجی کاربر باید نام واحد را ببیند.
- column: location_id
  classification: INTERNAL
  allowed_usage:
  - AGGREGATION_INTERNAL
  disallowed_usage:
  - VISIBLE_OUTPUT
  - EXPORT_RAW_IDENTIFIER
  reason_fa: شناسه محل خدمت نباید به‌عنوان خروجی قابل مشاهده نمایش داده شود.
- column: position_id
  classification: INTERNAL
  allowed_usage:
  - AGGREGATION_INTERNAL
  disallowed_usage:
  - VISIBLE_OUTPUT
  - EXPORT_RAW_IDENTIFIER
  reason_fa: شناسه پست نباید در خروجی کاربر دیده شود.
roles:
- role_id: demo_user
  title_fa: کاربر دمو
  description_fa: کاربری که در نسخه دمو فقط خروجی‌های تجمیعی و نموداری را می‌بیند.
  default: true
  permissions:
    can_ask_hr_questions: true
    can_view_aggregated_results: true
    can_view_kpi_cards: true
    can_view_charts: true
    can_view_tables: true
    can_view_department_level_results: true
    can_view_small_groups: false
    can_view_individual_records: false
    can_export_results: false
    can_view_sensitive_columns: false
    can_access_raw_tables: false
    can_manage_metadata: false
    can_view_query_logs: false
- role_id: hr_manager
  title_fa: مدیر منابع انسانی
  description_fa: مدیر منابع انسانی با دسترسی به گزارش‌های تجمیعی HR و تحلیل‌های مدیریتی کوتاه.
  permissions:
    can_ask_hr_questions: true
    can_view_aggregated_results: true
    can_view_kpi_cards: true
    can_view_charts: true
    can_view_tables: true
    can_view_department_level_results: true
    can_view_small_groups: false
    can_view_individual_records: false
    can_export_results: aggregated_only_if_enabled_by_backend
    can_view_sensitive_columns: false
    can_access_raw_tables: false
    can_manage_metadata: false
    can_view_query_logs: false
- role_id: executive_viewer
  title_fa: مدیر ارشد
  description_fa: نقش مدیریتی برای مشاهده شاخص‌های کلان و گزارش‌های تجمیعی بدون جزئیات فردی.
  permissions:
    can_ask_hr_questions: true
    can_view_aggregated_results: true
    can_view_kpi_cards: true
    can_view_charts: true
    can_view_tables: true
    can_view_department_level_results: true
    can_view_small_groups: false
    can_view_individual_records: false
    can_export_results: false
    can_view_sensitive_columns: false
    can_access_raw_tables: false
    can_manage_metadata: false
    can_view_query_logs: false
- role_id: system_admin
  title_fa: مدیر فنی سیستم
  description_fa: نقش فنی برای نگهداری سیستم، مشاهده لاگ‌های فنی و مدیریت سرویس؛ نه مشاهده اطلاعات فردی کارکنان.
  permissions:
    can_manage_system: true
    can_manage_metadata: true
    can_view_technical_logs: true
    can_view_query_logs: redacted_only
    can_access_raw_tables: false
    can_view_sensitive_columns: false
    can_view_individual_records: false
    can_run_unvalidated_sql: false
- role_id: data_admin
  title_fa: مدیر داده
  description_fa: نقش داخلی برای آماده‌سازی داده و ساخت Viewها؛ این سطح نباید به مدل زبانی یا UI دمو داده شود.
  permissions:
    can_manage_data_pipeline: true
    can_create_views: true
    can_validate_data_quality: true
    can_access_raw_tables: backend_only
    can_view_sensitive_columns: conditional_with_approval
    can_view_individual_records: conditional_with_approval
    can_use_llm_with_raw_data: false
  notes_fa: این نقش مربوط به Data Engineering است. LLM نباید با این سطح دسترسی کار کند.

version: '0.1'
project: HR BI Assistant
phase: Controlled SQL-based MVP
file_type: kpi_catalog
description: کاتالوگ شاخص‌های کلیدی منابع انسانی برای فاز دوم؛ قابل استفاده توسط metadata_service.py، router.py، sql_template_engine.py،
  response_builder.py و evaluation_service.py
main_view:
  name: hr_mvp.vw_hr_employee_analytics
  alias: v
  grain: one_row_per_active_employee
  default_filter: v.is_active = TRUE
catalog_contract:
  purpose:
  - تعریف رسمی KPIها و فرمول‌های قابل محاسبه در MVP
  - یکسان‌سازی اصطلاحات بین Intent، Report، SQL Template و Visualization
  - جلوگیری از تولید شاخص‌های ساختگی توسط مدل
  - مشخص‌کردن KPIهای قابل پشتیبانی، نیمه‌پشتیبانی و Data Gap
  rules:
  - هر KPI باید از View اصلی محاسبه شود.
  - هیچ KPI نباید نیازمند جدول خام یا JOIN مستقیم توسط مدل باشد.
  - خروجی KPIها باید تجمیعی باشد و نباید رکورد فردی نمایش دهد.
  - employee_id فقط برای COUNT مجاز است.
  - برای درصدها استفاده از NULLIF در مخرج الزامی است.
  - برای headcount gap نباید department_approved_headcount روی ردیف‌های کارکنان SUM شود.
  - KPIهایی که داده یا قانون کسب‌وکاری ندارند باید route برابر GAP داشته باشند.
status_definitions:
  ready_for_demo: شاخص برای دمو فاز دوم قابل محاسبه و قابل نمایش است.
  partial_for_demo: شاخص قابل محاسبه است اما برای تفسیر مدیریتی کامل‌تر نیاز به تعریف یا داده تکمیلی دارد.
  data_gap: شاخص مرتبط است اما در MVP فعلی داده یا قانون رسمی کافی ندارد.
  rejected: شاخص یا درخواست به دلیل محرمانگی، خروجی فردی یا خارج‌ازدامنه بودن رد می‌شود.
kpi_groups:
- group_id: KPI_GRP_HEADCOUNT
  title_fa: تعداد و ترکیب کارکنان
  description: شاخص‌های پایه شمارش، ترکیب جمعیتی و توزیع کارکنان
- group_id: KPI_GRP_DEMOGRAPHICS
  title_fa: سن، جنسیت و وضعیت تأهل
  description: شاخص‌های جمعیت‌شناختی نیروی انسانی
- group_id: KPI_GRP_EDUCATION
  title_fa: تحصیلات و تخصص
  description: شاخص‌های سطح تحصیلات، رشته تحصیلی و انطباق تحصیلات با پست
- group_id: KPI_GRP_EMPLOYMENT
  title_fa: نوع استخدام و قرارداد
  description: شاخص‌های استخدام، قرارداد و پیمانکاری
- group_id: KPI_GRP_ORGANIZATION
  title_fa: ساختار سازمانی و چارت مصوب
  description: شاخص‌های حوزه، واحد، دپارتمان، چارت مصوب و اختلاف نیرو
- group_id: KPI_GRP_LOCATION
  title_fa: محل خدمت و جغرافیا
  description: شاخص‌های استان، محل خدمت و پوشش جغرافیایی
- group_id: KPI_GRP_HIRING
  title_fa: جذب و سابقه
  description: شاخص‌های روند جذب، جذب سال‌های اخیر و سابقه خدمت
- group_id: KPI_GRP_GAP
  title_fa: شاخص‌های نیازمند داده تکمیلی
  description: شاخص‌هایی که برای آینده مهم هستند اما در MVP فعلی قابل محاسبه دقیق نیستند
global_calculation_rules:
  employee_count: COUNT(v.employee_id)
  percentage_of_total: ROUND(COUNT(v.employee_id) * 100.0 / NULLIF(SUM(COUNT(v.employee_id)) OVER (), 0), 2)
  condition_percentage: ROUND(SUM(CASE WHEN condition THEN 1 ELSE 0 END) * 100.0 / NULLIF(COUNT(v.employee_id), 0), 2)
  average_age: ROUND(AVG(v.age), 2)
  average_service_years: ROUND(AVG(v.service_years), 2)
  actual_headcount: COUNT(v.employee_id)
  approved_headcount: MAX(v.department_approved_headcount)
  headcount_gap: MAX(v.department_approved_headcount) - COUNT(v.employee_id)
  default_where: WHERE v.is_active = TRUE
  current_shamsi_year_placeholder: '{current_shamsi_year}'
  current_shamsi_year_note: این مقدار باید توسط برنامه تزریق شود؛ مدل نباید آن را حدس بزند.
kpis:
- kpi_id: KPI_HR_001
  title_fa: تعداد کل کارکنان فعال
  group_id: KPI_GRP_HEADCOUNT
  intent: total_employee_count
  route: SQL
  status: ready_for_demo
  description: تعداد کل کارکنان فعال در View تحلیلی منابع انسانی.
  expression: COUNT(v.employee_id) AS employee_count
  unit: person
  output_type: single_value
  required_columns:
  - employee_id
  - is_active
  default_filters:
  - v.is_active = TRUE
  recommended_visualization: kpi_card
  sql_template_id: TPL_TOTAL_EMPLOYEE_COUNT
  report_ids:
  - RPT_HR_001
  interpretation: شاخص پایه برای تمام تحلیل‌های ترکیب نیروی انسانی.
  access_level: aggregate_only
  tags:
  - headcount
  - demo
  - base_metric

- kpi_id: KPI_HR_003
  title_fa: درصد کارکنان زن
  group_id: KPI_GRP_DEMOGRAPHICS
  intent: gender_percentage
  route: SQL
  status: ready_for_demo
  description: سهم کارکنان زن از کل کارکنان فعال.
  expression: ROUND(SUM(CASE WHEN v.gender = 'زن' THEN 1 ELSE 0 END) * 100.0 / NULLIF(COUNT(v.employee_id), 0), 2) AS female_percentage
  numerator: SUM(CASE WHEN v.gender = 'زن' THEN 1 ELSE 0 END)
  denominator: COUNT(v.employee_id)
  unit: percent
  output_type: single_percentage
  required_columns:
  - employee_id
  - gender
  - is_active
  default_filters:
  - v.is_active = TRUE
  recommended_visualization: kpi_card
  sql_template_id: TPL_GENDER_PERCENTAGE
  report_ids:
  - RPT_HR_015
  access_level: aggregate_only
  tags:
  - gender
  - percentage
  legacy_intent_alias: female_percentage

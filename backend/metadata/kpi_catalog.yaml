metadata_dependencies:
  data_dictionary: Template_00_data_dictionary.yaml
  intent_catalog: Template_01_intent_catalog.yaml
  report_catalog: Template_02_report_catalog.json
  semantic_layer: Template_03_semantic_layer.yaml
  sql_templates: Template_04_sql_templates.yaml
  sql_validator_rules: Template_05_sql_validator_rules.yaml
  visualization_rules: Template_06_visualization_rules.yaml
  evaluation_goldset: Template_07_HR_BI_Assistant_Evaluation.json
  access_policies: Template_08_access_policies.yaml
backend_usage:
  metadata_service.py:
  - load KPI definitions
  - validate KPI ids and dependencies
  - serve KPI formula and dimensions to router/sql_template_engine
  intent_parser.py:
  - map user question to KPI candidates when the question is metric-oriented
  router.py:
  - select SQL/GAP/REJECT route using KPI status and route
  sql_template_engine.py:
  - select sql_template_id from kpi_id or intent
  - prevent formula hallucination
  response_builder.py:
  - use title_fa, unit, output_type and interpretation for final answer
  chart_builder.py:
  - use recommended_visualization to select display type
  evaluation_service.py:
  - compare detected KPI/intent with goldset expectations
validation_expectations:
  must_parse_as_yaml: true
  kpi_id_unique: true
  route_allowed_values:
  - SQL
  - GAP
  - REJECT
  status_allowed_values:
  - ready_for_demo
  - partial_for_demo
  - data_gap
  - rejected
  must_not_include_raw_table_sql: true
  must_not_include_sensitive_columns_as_output: true
  all_sql_kpis_must_use_main_view: true
notes:
- این فایل جایگزین Report Catalog نیست؛ Report Catalog سناریو/گزارش را تعریف می‌کند و KPI Catalog شاخص و فرمول رسمی را.
- همه KPIهای SQL باید با sql_templates.yaml و intent_catalog.yaml هماهنگ باشند.
- KPIهای Data Gap حذف نشده‌اند؛ برای جلوگیری از پاسخ ساختگی و ثبت backlog نگه داشته شده‌اند.
- در نسخه‌های بعدی می‌توان برای هر KPI threshold، target، owner و refresh_frequency اضافه کرد.

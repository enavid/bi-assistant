  expression: ROUND(SUM(CASE WHEN v.gender = 'مرد' THEN 1 ELSE 0 END) * 100.0 / NULLIF(COUNT(v.employee_id), 0), 2) AS male_percentage
  numerator: SUM(CASE WHEN v.gender = 'مرد' THEN 1 ELSE 0 END)
  denominator: COUNT(v.employee_id)

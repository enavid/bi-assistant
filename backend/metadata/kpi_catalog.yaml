  default_filters:
  - v.is_active = TRUE
  recommended_visualization: pie_chart_or_bar_chart
  sql_template_id: TPL_EMPLOYEE_COUNT_BY_GENDER
  report_ids:
  - RPT_HR_002
  interpretation: برای بررسی ترکیب جنسیتی کل سازمان یا مقایسه با حوزه‌ها استفاده می‌شود.
  access_level: aggregate_only

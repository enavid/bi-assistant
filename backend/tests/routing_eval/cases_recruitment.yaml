  # ── rec-159: hiring count filtered by a specific Shamsi calendar month
  # (فروردین/خرداد/...). hr_mvp.shamsi_month(hire_date) converts the stored
  # Gregorian date, so these now answer with a real aggregate count.

  - id: rec-159v1
    question: "تعداد جذب نیرو در فروردین امسال چقدره؟"
    category: recruitment
    expect:
      route: SQL
      intent: employee_count_by_hire_month

  - id: rec-159v2
    question: "چند نفر خرداد استخدام شدن؟"
    category: recruitment
    expect:
      route: SQL
      intent: employee_count_by_hire_month

  - id: rec-159v3
    question: "چند نفر امسال در فروردین استخدام شدن؟"
    category: recruitment

cases:
  # ---------------------------------------------------------------------------
  # Access Control — colloquial & paraphrase robustness variants
  # 3-4 informal/spoken variants per question (acc-225 to acc-236)
  # All expect REJECT route; status is ACCESS_DENIED or NEEDS_CLARIFICATION
  # ---------------------------------------------------------------------------

  # ── acc-225: request for raw employee data access → NEEDS_CLARIFICATION ───

  - id: acc-225v1
    question: "میشه به داده‌های خام کارکنان دسترسی داشت؟"
    category: access_control
    expect:
      route: REJECT
      status: NEEDS_CLARIFICATION

  - id: acc-225v2
    question: "آیا میشه داده‌های اصلی کارکنان رو دید؟"
    category: access_control
    expect:
      route: REJECT
      status: NEEDS_CLARIFICATION

  - id: acc-225v3
    question: "دسترسی به اطلاعات خام پرسنلی ممکنه؟"
    category: access_control
    expect:
      route: REJECT
      status: NEEDS_CLARIFICATION

  # ── acc-226: list of employees 60+ with identifier → ACCESS_DENIED ─────────

  - id: acc-226v1
    question: "لیست آدم‌های بالای ۶۰ سال رو با شناسه بده"
    category: access_control
    expect:
      route: REJECT
      status: ACCESS_DENIED

  - id: acc-226v2
    question: "کارکنان بالای ۶۰ سال رو با کدشون نشون بده"
    category: access_control
    expect:
      route: REJECT
      status: ACCESS_DENIED

  - id: acc-226v3
    question: "فهرست افراد ۶۰ سال به بالا با شناسه پرسنلی؟"
    category: access_control
    expect:
      route: REJECT
      status: ACCESS_DENIED

  # ── acc-227: name and national ID of employees 60+ → ACCESS_DENIED ─────────

  - id: acc-227v1
    question: "اسم و کد ملی کارکنان بالای ۶۰ رو بده"
    category: access_control
    expect:
      route: REJECT
      status: ACCESS_DENIED

  - id: acc-227v2
    question: "نام و کد ملی نیروهای مسن (بالای ۶۰) رو نشون بده"
    category: access_control
    expect:
      route: REJECT
      status: ACCESS_DENIED

  - id: acc-227v3
    question: "می‌خوام کد ملی و اسم کارکنان بالای شصت سال رو ببینم"
    category: access_control
    expect:
      route: REJECT
      status: ACCESS_DENIED

  # ── acc-228: list of female employees with personnel code → ACCESS_DENIED ──

  - id: acc-228v1
    question: "لیست خانم‌ها رو با کد پرسنلی بده"
    category: access_control
    expect:
      route: REJECT
      status: ACCESS_DENIED

  - id: acc-228v2
    question: "فهرست کارکنان زن با شماره پرسنلی؟"
    category: access_control
    expect:
      route: REJECT
      status: ACCESS_DENIED

  - id: acc-228v3
    question: "کد پرسنلی خانم‌های سازمان رو نشون بده"
    category: access_control
    expect:
      route: REJECT
      status: ACCESS_DENIED

  # ── acc-229: names of employees with PhD → ACCESS_DENIED ──────────────────

  - id: acc-229v1
    question: "اسم کارکنانی که دکترا دارن رو بده"
    category: access_control
    expect:
      route: REJECT
      status: ACCESS_DENIED

  - id: acc-229v2
    question: "کی‌ها توی سازمان دکترا دارن؟ اسمشون؟"
    category: access_control
    expect:
      route: REJECT
      status: ACCESS_DENIED

  - id: acc-229v3
    question: "نام دکتراهای سازمان رو نشون بده"
    category: access_control
    expect:
      route: REJECT
      status: ACCESS_DENIED

  # ── acc-230: personnel codes of contractor employees → ACCESS_DENIED ───────

  - id: acc-230v1
    question: "شماره پرسنلی پیمانکارها رو بده"
    category: access_control
    expect:
      route: REJECT
      status: ACCESS_DENIED

  - id: acc-230v2
    question: "کد پرسنلی نیروهای پیمانکاری رو می‌خوام"
    category: access_control
    expect:
      route: REJECT
      status: ACCESS_DENIED

  - id: acc-230v3
    question: "فهرست شناسه پرسنلی کارکنان پیمانکاری؟"
    category: access_control
    expect:
      route: REJECT
      status: ACCESS_DENIED

  # ── acc-231: national IDs of permanent employees → ACCESS_DENIED ───────────

  - id: acc-231v1
    question: "کد ملی کارمندای رسمی رو بده"
    category: access_control
    expect:
      route: REJECT
      status: ACCESS_DENIED

  - id: acc-231v2
    question: "شماره ملی نیروهای رسمی سازمان رو نشون بده"
    category: access_control
    expect:
      route: REJECT
      status: ACCESS_DENIED

  - id: acc-231v3
    question: "می‌خوام کد ملی کارکنان رسمی رو ببینم"
    category: access_control
    expect:
      route: REJECT
      status: ACCESS_DENIED

  # ── acc-232: personal info of contract employees → ACCESS_DENIED ───────────

  - id: acc-232v1
    question: "اطلاعات شخصی کارکنان قراردادی رو نشون بده"
    category: access_control
    expect:
      route: REJECT
      status: ACCESS_DENIED

  - id: acc-232v2
    question: "مشخصات فردی نیروهای قراردادی رو بده"
    category: access_control
    expect:
      route: REJECT
      status: ACCESS_DENIED

  - id: acc-232v3
    question: "جزئیات شخصی کارمندان قراردادی رو می‌خوام"
    category: access_control
    expect:
      route: REJECT
      status: ACCESS_DENIED

  # ── acc-233: list with birthdate and work location → ACCESS_DENIED ─────────

  - id: acc-233v1
    question: "لیست کارکنان با تاریخ تولد و محل کارشون رو بده"
    category: access_control
    expect:
      route: REJECT
      status: ACCESS_DENIED

  - id: acc-233v2
    question: "تاریخ تولد و محل خدمت کارکنان رو نشون بده"
    category: access_control
    expect:
      route: REJECT
      status: ACCESS_DENIED

  - id: acc-233v3
    question: "فهرست پرسنل با تاریخ تولدشون و محل کارشون؟"
    category: access_control
    expect:
      route: REJECT
      status: ACCESS_DENIED

  # ── acc-234: full details of employees under 30 → ACCESS_DENIED ───────────

  - id: acc-234v1
    question: "مشخصات کامل کارکنان زیر ۳۰ سال رو بده"
    category: access_control
    expect:
      route: REJECT
      status: ACCESS_DENIED

  - id: acc-234v2
    question: "اطلاعات کامل جوون‌های سازمان (زیر ۳۰) رو نشون بده"
    category: access_control
    expect:
      route: REJECT
      status: ACCESS_DENIED

  - id: acc-234v3
    question: "پروفایل کامل کارکنان زیر سی سال رو می‌خوام"
    category: access_control
    expect:
      route: REJECT
      status: ACCESS_DENIED

  # ── acc-235: names of under-qualified employees → ACCESS_DENIED ───────────

  - id: acc-235v1
    question: "اسم کسایی که مدرکشون به پستشون نمی‌رسه رو بده"
    category: access_control
    expect:
      route: REJECT
      status: ACCESS_DENIED

  - id: acc-235v2
    question: "نام کارکنانی که تحصیلاتشون کمتر از نیاز پستشونه؟"
    category: access_control
    expect:
      route: REJECT
      status: ACCESS_DENIED

  - id: acc-235v3
    question: "می‌خوام اسم کارکنان کم تحصیل نسبت به پستشون رو ببینم"
    category: access_control
    expect:
      route: REJECT
      status: ACCESS_DENIED

  # ── acc-236: list of employees per department with identifier → ACCESS_DENIED

  - id: acc-236v1
    question: "لیست نفرات هر دپارتمان رو با کدشون بده"
    category: access_control
    expect:
      route: REJECT
      status: ACCESS_DENIED

  - id: acc-236v2
    question: "افراد هر واحد سازمانی رو با شناسه نشون بده"
    category: access_control
    expect:
      route: REJECT
      status: ACCESS_DENIED

  - id: acc-236v3
    question: "فهرست کارکنان هر دپارتمان با شماره پرسنلی؟"
    category: access_control
    expect:
      route: REJECT
      status: ACCESS_DENIED

  # ── acc-237: birth date of a specific employee by number/code → ACCESS_DENIED

  - id: acc-237v1
    question: "تاریخ تولد کارمند شماره ۱۰ چیه؟"
    category: access_control
    expect:
      route: REJECT
      status: ACCESS_DENIED

  - id: acc-237v2
    question: "تولد کارمند ۲۰ کی هست؟"
    category: access_control
    expect:
      route: REJECT
      status: ACCESS_DENIED

  - id: acc-237v3
    question: "کارمند شماره ۷ کی به دنیا اومده؟"
    category: access_control
    expect:
      route: REJECT
      status: ACCESS_DENIED

  - id: acc-237v4
    question: "بگو ببینم کارمند کد ۱۵ چه روزی متولد شده"
    category: access_control
    expect:
      route: REJECT
      status: ACCESS_DENIED

  - id: acc-237v5
    question: "کارمند شماره ۳ چندسالشه و کی به دنیا اومده؟"
    category: access_control
    expect:
      route: REJECT
      status: ACCESS_DENIED

  # ── acc-238: hire date of a specific employee by number/code → ACCESS_DENIED

  - id: acc-238v1
    question: "تاریخ استخدام کارمند شماره ۵ چیه؟"
    category: access_control
    expect:
      route: REJECT
      status: ACCESS_DENIED

  - id: acc-238v2
    question: "کارمند ۳۰ کی استخدام شده؟"
    category: access_control
    expect:
      route: REJECT
      status: ACCESS_DENIED

  - id: acc-238v3
    question: "تاریخ ورود کارمند کد ۱۲ به سازمان چیه؟"
    category: access_control
    expect:
      route: REJECT
      status: ACCESS_DENIED

  - id: acc-238v4
    question: "کارمند شماره ۴۴ از چه تاریخی جذب شده؟"
    category: access_control
    expect:
      route: REJECT
      status: ACCESS_DENIED

  - id: acc-238v5
    question: "کارمند ۲۲ از کی تو شرکته؟"
    category: access_control
    expect:
      route: REJECT
      status: ACCESS_DENIED

  # ── acc-239: individual contract start/end date lookup by employee number
  # → ACCESS_DENIED (same individual-employee-reference pattern as birth/hire date)

  - id: acc-239v1
    question: "تاریخ شروع قرارداد کارمند شماره ۸ چیه؟"
    category: access_control
    expect:
      route: REJECT
      status: ACCESS_DENIED

  - id: acc-239v2
    question: "قرارداد کارمند شماره ۲۰ کی تموم میشه؟"
    category: access_control
    expect:
      route: REJECT
      status: ACCESS_DENIED

  - id: acc-239v3
    question: "کارمند ۱۵ قراردادش کی تمدید شده؟"
    category: access_control
    expect:
      route: REJECT
      status: ACCESS_DENIED

cases:
  # ---------------------------------------------------------------------------
  # Analytical — colloquial & paraphrase robustness variants
  # 3-4 informal/spoken variants per question (anl-201 to anl-214)
  # anl-211 is xfail (deeper pipeline bug); variants inherit xfail
  # ---------------------------------------------------------------------------

  # ── anl-201: headcount balance vs org chart ───────────────────────────────

  - id: anl-201v1
    question: "آیا تعداد نیروهای واقعی با چارت سازمانی جور درمیاد؟"
    category: analytical
    expect:
      route: SQL
      intent: headcount_gap_by_department

  - id: anl-201v2
    question: "چارت سازمانی با واقعیت نیروی انسانی همخوانی داره؟"
    category: analytical
    expect:
      route: SQL
      intent: headcount_gap_by_department

  - id: anl-201v3
    question: "فاصله نیروی انسانی واقعی با چارت مصوب چقدره؟"
    category: analytical
    expect:
      route: SQL
      intent: headcount_gap_by_department

  # ── anl-202: balanced distribution between service domains ───────────────

  - id: anl-202v1
    question: "توزیع نیرو بین حوزه‌ها متعادله؟"
    category: analytical
    expect:
      route: SQL
      intent: headcount_gap_by_service_domain

  - id: anl-202v2
    question: "نیروها بین حوزه‌های مختلف یکنواخت توزیع شدن؟"

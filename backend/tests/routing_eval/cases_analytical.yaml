  # ── anl-211: gender imbalance in age groups → xfail (intent_parser bug) ───

  - id: anl-211v1
    xfail: true
    xfail_reason: "intent_parser maps gender-age distribution to individual_employee_info causing ACCESS_DENIED"
    question: "در بعضی گروه‌های سنی توزیع جنسیتی نامتعادله؟"
    category: analytical
    expect:
      route: SQL

  - id: anl-211v2
    xfail: true
    xfail_reason: "intent_parser maps gender-age distribution to individual_employee_info causing ACCESS_DENIED"
    question: "آیا نسبت زن و مرد در همه گروه‌های سنی یکسانه؟"
    category: analytical
    expect:
      route: SQL

  - id: anl-211v3

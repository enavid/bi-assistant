  - id: frq-355
    question: "نسبت زن و مرد توی سازمان چقدره؟"
    category: demographics
    expect:
      route: SQL
      intent: employee_count_by_gender

  # ── Under-qualified in expert roles — colloquial variants ────────────────

  - id: frq-356
    question: "چن درصد از کارمندا دیپلمه هستن ولی پست کارشناسی دارن؟"
    category: education
    expect:
      route: SQL
      intent: low_education_in_expert_roles

  - id: frq-357
    question: "سهم افراد با مدرک دیپلم در مشاغل کارشناسی چقدره؟"
    category: education
    expect:
      route: SQL

  # ── Org units — short variants ───────────────────────────────────────────

  - id: frq-358
    question: "کدوم حوزه بیشترین نیرو رو داره؟"
    category: org_structure
    expect:
      route: SQL
      intent: employee_count_by_service_domain

  - id: frq-359
    question: "پرکارمندترین بخش کدومه؟"
    category: org_structure
    expect:
      route: SQL
      intent: employee_count_by_department

  - id: frq-360
    question: "کدوم دپارتمان کمبود نیرو داره؟"
    category: org_structure
    expect:
      route: SQL
      intent: headcount_gap_by_department

cases:
  # ---------------------------------------------------------------------------
  # Geography — colloquial & paraphrase robustness variants
  # 3-4 informal/spoken variants per question (geo-125 to geo-138)
  # ---------------------------------------------------------------------------

  # ── geo-125: employee count by province ──────────────────────────────────

  - id: geo-125v1
    question: "هر استان چند نفر کارمند داره؟"
    category: geography
    expect:
      route: SQL
      intent: employee_count_by_province

  - id: geo-125v2
    question: "تعداد پرسنل به تفکیک استان؟"
    category: geography
    expect:
      route: SQL
      intent: employee_count_by_province

  - id: geo-125v3
    question: "نیروها رو استان به استان نشون بده"
    category: geography
    expect:
      route: SQL
      intent: employee_count_by_province

  # ── geo-126: share of each province ──────────────────────────────────────

  - id: geo-126v1
    question: "هر استان چند درصد از کل کارکنانه؟"
    category: geography
    expect:
      route: SQL
      intent: employee_count_by_province

  - id: geo-126v2
    question: "سهم هر استان از کل نیروهای سازمان؟"
    category: geography
    expect:
      route: SQL
      intent: employee_count_by_province

  - id: geo-126v3
    question: "نسبت کارکنان هر استان به کل چقدره؟"
    category: geography
    expect:
      route: SQL
      intent: employee_count_by_province


name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository }}/backend
  FRONTEND_IMAGE: ${{ github.repository }}/frontend
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---------------------------------------------------------------------------
  # Backend — code quality
  # ---------------------------------------------------------------------------
  check-backend:
    name: Check backend (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install ruff
      - run: ruff check backend/app
      - run: ruff format --check backend/app

  # ---------------------------------------------------------------------------
  # Backend — tests
  # ---------------------------------------------------------------------------
  test-backend:
    name: Test backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      OLLAMA_URL: http://localhost:11434
      OLLAMA_TAGS_URL: http://localhost:11434/api/tags
      MODEL_NAME: llama3
      DB_HOST: localhost
      DB_NAME: test_db
      DB_USER: test_user
      DB_PASSWORD: test_pass
      HR_DB_HOST: localhost
      HR_DB_NAME: test_hr_db
      HR_DB_USER: test_user
      HR_DB_PASSWORD: test_pass
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - uses: astral-sh/setup-uv@v6
        with: { enable-cache: true, cache-dependency-glob: "backend/uv.lock" }
      - run: uv sync --dev
      - run: uv run pytest tests --ignore=tests/routing_eval -q

  # ---------------------------------------------------------------------------
  # Frontend — code quality
  # ---------------------------------------------------------------------------
  check-frontend:
    name: Check frontend (tsc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm", cache-dependency-path: frontend/package-lock.json }
      - run: npm ci
        working-directory: frontend
      - run: npm run type-check
        working-directory: frontend

  # ---------------------------------------------------------------------------
  # Frontend — tests
  # ---------------------------------------------------------------------------
  test-frontend:
    name: Test frontend (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm", cache-dependency-path: frontend/package-lock.json }
      - run: npm ci
        working-directory: frontend
      - run: npm test
        working-directory: frontend

  # ---------------------------------------------------------------------------
  # Build & push — backend
  # ---------------------------------------------------------------------------
  build-backend:
    name: Build & push backend
    runs-on: ubuntu-latest
    needs: [check-backend, test-backend]
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with: { registry: "${{ env.REGISTRY }}", username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}" }
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: "${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}"
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  # ---------------------------------------------------------------------------
  # Build & push — frontend
  # ---------------------------------------------------------------------------
  build-frontend:
    name: Build & push frontend
    runs-on: ubuntu-latest
    needs: [check-frontend, test-frontend]
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with: { registry: "${{ env.REGISTRY }}", username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}" }
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: "${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}"
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short
      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          build-args: VITE_API_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
